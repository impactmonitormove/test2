.field input:disabled,.field select:disabled,.field textarea:disabled{background:#f1f5f9;color:#475467;cursor:not-allowed}.quarter-list{display:grid;gap:8px;margin-top:10px}.quarter-row{display:flex;align-items:center;justify-content:space-between;gap:10px;background:#f8fafc;border:1px solid var(--line);border-radius:13px;padding:9px 11px}.project-card-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:14px}.project-card-head h3{margin:0}.project-savebar{display:flex;justify-content:flex-end;border-top:1px solid var(--line);margin-top:18px;padding-top:18px}.project-action{font-size:15px;padding:12px 18px}.kpi-accordion{display:grid;gap:12px}.kpi-detail{border:1px solid var(--line);border-radius:17px;background:#fff;overflow:hidden}.kpi-detail summary{cursor:pointer;padding:16px;list-style:none;display:flex;justify-content:space-between;gap:14px;align-items:center}.kpi-detail summary::-webkit-details-marker{display:none}.kpi-detail summary:after{content:"Uitklappen";font-size:12px;font-weight:900;color:var(--brand)}.kpi-detail[open] summary:after{content:"Inklappen"}.kpi-detail-body{border-top:1px solid var(--line);padding:16px;background:#fbfdff}.kpi-summary-meta{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px}.category-detail>summary{background:#eef8f5}.category-detail>summary strong{font-size:18px}.kpi-with-activities{border:1px solid var(--line);border-radius:16px;background:#fff;padding:16px;margin-bottom:14px}.kpi-with-activities:last-child{margin-bottom:0}

.report-page{--report-primary:#147a73;--report-accent:#41a36f;--report-cover:#0e2d3e;position:relative;overflow:hidden}.report-page:before{content:"";display:block;height:7px;background:linear-gradient(90deg,var(--report-primary),var(--report-accent));position:absolute;left:0;right:0;top:0}.report-page h2,.report-page h3{color:var(--report-cover)}.report-page .report-cover{background:linear-gradient(135deg,var(--report-cover),var(--report-primary))}.report-page .cat-badge{color:var(--report-primary);border-color:var(--report-accent)}.report-page .meter span{background:var(--report-accent)}.report-footer{display:flex;justify-content:space-between;border-top:1px solid #d8dee8;margin-top:18px;padding-top:8px;font-size:10px;color:#667085}.theme-settings{display:flex;gap:12px;flex-wrap:wrap;align-items:end}.theme-settings label{display:grid;gap:5px;font-size:11px;font-weight:900;text-transform:uppercase;color:var(--muted)}.theme-settings input[type=color]{width:52px;height:38px;padding:3px;border:1px solid var(--line);border-radius:10px;background:white}@page{size:A4 portrait;margin:0}@media print{body{background:white!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}.report-page{width:210mm;height:297mm;min-height:297mm;max-height:297mm;overflow:hidden;padding:14mm 13mm 12mm!important;font-size:10px}.report-page h2{font-size:24px}.report-page h3{font-size:13px;margin-bottom:7px}.report-page p{line-height:1.35;margin:5px 0}.report-page .card{padding:10px;border-radius:9px}.report-page .grid{gap:8px}.report-page .split{gap:8px;margin-top:8px!important}.report-page .kpis{gap:8px}.report-page .tile .val{font-size:22px}.report-page .table{font-size:8px}.report-page .table th,.report-page .table td{padding:5px 4px}.report-page .notice{padding:8px;border-radius:8px}.report-page .pill{padding:3px 5px;font-size:8px}.report-page .report-cover{padding:18px;margin-bottom:10px}.report-page .empty{padding:8px}.report-page .meter{height:6px}}

<body>
<div class="app"><aside class="sidebar"><div class="logo"><div class="mark">BI</div><div><h1>BeweegImpact</h1><span>Gemeenteproject monitor</span></div></div><nav class="nav" id="nav"></nav><div class="side-card"><strong id="sideProject">Project</strong><p id="sideMeta">Vaste categorieën, KPI-stoplichten, activiteiten en verantwoordingsplanning.</p></div></aside><main class="main" id="main"></main></div>
<div class="modal-backdrop" id="modal"><div class="modal" id="modalContent"></div></div><div class="toast" id="toast"></div>
<script>
const CATS=[{id:'jeugd',name:'Jeugd',icon:'🧒'},{id:'jongeren',name:'Jongeren',icon:'🏀'},{id:'volwassenen',name:'Volwassenen',icon:'🚶'},{id:'senioren',name:'Senioren',icon:'🌿'},{id:'jogg',name:'JOGG',icon:'🍎'},{id:'verenigingsondersteuning',name:'Verenigingsondersteuning',icon:'🤝'},{id:'evenementen',name:'Evenementen',icon:'🎪'}];
const STORE='beweegimpact_categorie_v4';
let state=load(); installDemoData(); let chartA=null; let chartB=null; let chartFinance=null; let chartHours=null; let chart4v=null;
function defaults(){return{project:{naam:'Gemeenteproject Sport & Bewegen',gemeente:'Gemeente Demo',projectleider:'',financiering:'SPUK / Lokaal sportakkoord',subsidieBedrag:'',btwStatus:'incl',overigeAantekeningen:'',looptijdStart:'2026-01-01',looptijdEind:'2026-12-31',kwartaalDatums:'2026-04-15, 2026-07-15, 2026-10-15, 2027-01-15',deadlineVerantwoording:'2027-02-01',typeVerantwoording:'financieel_rapportage',meldingKwartaalDagen:30,meldingEindDagen:90,vergrendeld:false},kpis:seedKpis(),activities:[],registrations:{},expenses:[],hours:[],safety4v:[],photos:{},reports:{}}}
function seedKpis(){return CATS.map(c=>({id:uid(),category:c.id,name:'Aantal aanwezige deelnemers',target:c.id==='evenementen'?500:c.id==='jogg'?750:300,metric:'participants',toelichting:''}));}
function load(){try{return JSON.parse(localStorage.getItem(STORE))||defaults()}catch(e){return defaults()}}
function installDemoData(){
  if(state.demoDataV1)return;
  state.kpis=state.kpis||[];
  state.activities=state.activities||[];
  state.registrations=state.registrations||{};
  CATS.forEach((cat,index)=>{
    let participantKpi=state.kpis.find(k=>k.category===cat.id&&k.metric==='participants');
    if(!participantKpi){
      participantKpi={id:'demo_kpi_deelnemers_'+cat.id,category:cat.id,name:'Bereikte deelnemers',target:300+(index*25),metric:'participants',toelichting:'Aantal deelnemers dat met de activiteiten binnen deze categorie wordt bereikt.'};
      state.kpis.push(participantKpi);
    }else{
      participantKpi.toelichting=participantKpi.toelichting||'Aantal deelnemers dat met de activiteiten binnen deze categorie wordt bereikt.';
    }
    let hoursKpi={id:'demo_kpi_uren_'+cat.id,category:cat.id,name:'Ingezette uitvoeringsuren',target:80+(index*10),metric:'hours',toelichting:'Totaal aantal uren dat is ingezet voor voorbereiding en uitvoering.'};
    if(!state.kpis.some(k=>k.id===hoursKpi.id))state.kpis.push(hoursKpi);
    let recurring={id:'demo_activity_recurring_'+cat.id,kpiId:participantKpi.id,category:cat.id,quarter:'Q1',title:'Wekelijkse '+cat.name.toLowerCase()+'activiteit',type:'recurring',startDate:'2026-01-15',endDate:'2026-03-26',frequency:'biweekly',time:'15:30',wijk:'Centrum',doelgroep:cat.name,partner:'Lokale sportaanbieder',expected:24};
    let single={id:'demo_activity_single_'+cat.id,kpiId:hoursKpi.id,category:cat.id,quarter:'Q1',title:'Themabijeenkomst '+cat.name,type:'single',date:'2026-03-20',time:'13:00',wijk:'Gemeentehuis',doelgroep:cat.name,partner:'Gemeente en netwerkpartners',expected:20};
    if(!state.activities.some(a=>a.id===recurring.id))state.activities.push(recurring);
    if(!state.activities.some(a=>a.id===single.id))state.activities.push(single);
    calcOccurrences(recurring).forEach((occ,i)=>{
      if(!state.registrations[occ.id])state.registrations[occ.id]={participants:18+index+(i%3)*3,flow:2+(i%2),partners:'Lokale sportaanbieder',registeredAt:occ.date+'T17:00:00.000Z'};
    });
    let singleOcc=calcOccurrences(single)[0];
    if(!state.registrations[singleOcc.id])state.registrations[singleOcc.id]={hours:12+index,flow:1,partners:'Gemeente en netwerkpartners',registeredAt:single.date+'T17:00:00.000Z'};
  });
  state.demoDataV1=true;
  localStorage.setItem(STORE,JSON.stringify(state));
}
function save(){localStorage.setItem(STORE,JSON.stringify(state)); render();}
function uid(){return Math.random().toString(36).slice(2,9)+Date.now().toString(36).slice(-4)}
function fmt(n){return new Intl.NumberFormat('nl-NL').format(Math.round(Number(n)||0))}
function todayISO(){return new Date().toISOString().slice(0,10)}
function dt(activity, occDate){return new Date((occDate||activity.date||todayISO())+'T'+(activity.time||'23:59'))}
function catName(id){return (CATS.find(c=>c.id===id)||{}).name||id}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.style.display='block';setTimeout(()=>t.style.display='none',2600)}
function escapeHtml(s){return String(s??'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]))}
function statusFor(pct){if(pct>=80)return'green'; if(pct>=50)return'orange'; return'red'}
function statusLabel(s){return s==='green'?'Groen / op koers':s==='orange'?'Oranje / aandacht':'Rood / achterstand'}
function calcOccurrences(a){ if(a.type!=='recurring') return [{id:a.id+'_'+a.date,date:a.date}]; let res=[], cur=new Date(a.startDate+'T00:00'), end=new Date(a.endDate+'T00:00'); let step=a.frequency==='biweekly'?14:a.frequency==='monthly'?31:7; let count=0; while(cur<=end && count<200){let iso=cur.toISOString().slice(0,10); res.push({id:a.id+'_'+iso,date:iso}); if(a.frequency==='monthly'){cur.setMonth(cur.getMonth()+1)}else{cur.setDate(cur.getDate()+step)} count++;} return res;}
function allOccurrences(){let rows=[]; state.activities.forEach(a=>calcOccurrences(a).forEach(o=>rows.push({...a,occurrenceId:o.id,occDate:o.date,registered:!!state.registrations[o.id],reg:state.registrations[o.id]}))); return rows.sort((a,b)=>dt(a,a.occDate)-dt(b,b.occDate));}
function dueOccurrences(){const now=new Date(); return allOccurrences().filter(o=>dt(o,o.occDate)<now && !o.registered);}
function categoryRows(cat){return allOccurrences().filter(o=>o.category===cat)}
function sumFor(cat){const rows=categoryRows(cat), regs=rows.map(r=>r.reg).filter(Boolean); return {activities:rows.length,registered:regs.length,participants:regs.reduce((s,r)=>s+(+r.participants||0),0),unique:regs.reduce((s,r)=>s+(+r.unique||0),0),flow:regs.reduce((s,r)=>s+(+r.flow||0),0),hours:regs.reduce((s,r)=>s+(+r.hours||0),0)}}
function metricValue(kpi){const rows=categoryRows(kpi.category).filter(r=>!r.kpiId||r.kpiId===kpi.id), regs=rows.map(r=>r.reg).filter(Boolean); if(kpi.metric==='participants')return regs.reduce((s,r)=>s+(+r.participants||0),0); if(kpi.metric==='activities')return regs.length; if(kpi.metric==='flow')return regs.reduce((s,r)=>s+(+r.flow||0),0); if(kpi.metric==='partners')return new Set(regs.flatMap(r=>String(r.partners||'').split(/[;,\n]/)).map(x=>x.trim().toLowerCase()).filter(Boolean)).size; if(kpi.metric==='hours')return regs.reduce((s,r)=>s+(+r.hours||0),0); return 0;}
function metricLabel(metric){return({participants:'Aanwezige deelnemers',activities:'Aantal activiteiten',flow:'Doorstroom deelnemers',partners:'Aantal samenwerkingspartners',hours:'Uren inzet'})[metric]||metric}
function metricOptions(selected='participants'){return[['participants','Aanwezige deelnemers'],['activities','Aantal activiteiten'],['flow','Doorstroom deelnemers'],['partners','Aantal samenwerkingspartners'],['hours','Uren inzet']].map(([v,l])=>`<option value="${v}" ${selected===v?'selected':''}>${l}</option>`).join('')}
function projectEvents(){const p=state.project, ev=[]; if(p.looptijdStart)ev.push({type:'Start project',date:p.looptijdStart,reminderDays:0}); (p.kwartaalDatums||'').split(/[;,\n]/).map(x=>x.trim()).filter(Boolean).forEach((d,i)=>ev.push({type:'Kwartaalrapportage '+(i+1),date:d,reminderDays:+(p.meldingKwartaalDagen||30)})); if(p.deadlineVerantwoording)ev.push({type:'Deadline eindverantwoording',date:p.deadlineVerantwoording,reminderDays:+(p.meldingEindDagen||90)}); if(p.looptijdEind)ev.push({type:'Einde projectperiode',date:p.looptijdEind,reminderDays:0}); return ev.filter(e=>!isNaN(new Date(e.date))).sort((a,b)=>new Date(a.date)-new Date(b.date));}
function dueProjectAlerts(){const now=new Date(); return projectEvents().map(e=>{const diff=Math.ceil((new Date(e.date)-now)/(1000*60*60*24)); return {...e,diff}}).filter(e=>e.reminderDays>0&&e.diff>=0&&e.diff<=e.reminderDays);}
function navButton(id,label,active){return `<button class="${active?'active':''}" data-tab="${id}">${label}</button>`}
function renderNav(tab='dashboard'){document.getElementById('nav').innerHTML=[navButton('dashboard','Dashboard',tab==='dashboard'),navButton('project','Project',tab==='project'),navButton('kpis','KPI’s & stoplichten',tab==='kpis'),...CATS.map(c=>navButton('cat-'+c.id,c.icon+' '+c.name,tab==='cat-'+c.id)),navButton('rapportage','Rapportage',tab==='rapportage'),navButton('data','Data & export',tab==='data')].join(''); document.querySelectorAll('.nav button').forEach(b=>b.onclick=()=>show(b.dataset.tab));}
function show(tab){renderNav(tab); renderMain(tab); window.scrollTo(0,0)}
function render(){const active=document.querySelector('.nav button.active')?.dataset.tab||'dashboard'; document.getElementById('sideProject').textContent=state.project.naam||'Project'; document.getElementById('sideMeta').textContent=(state.project.gemeente||'')+' · '+(state.project.looptijdStart||'?')+' t/m '+(state.project.looptijdEind||'?'); renderNav(active); renderMain(active)}
function alertsHtml(){const due=dueOccurrences(), pa=dueProjectAlerts(); let html=''; if(due.length) html+=`<div class="alert red"><strong>${due.length} activiteit(en) hebben registratie nodig.</strong> <button class="btn small" onclick="openRegistration('${due[0].occurrenceId}')">Open eerste registratie</button></div>`; if(pa.length) html+=`<div class="alert"><strong>Planning:</strong> ${pa.map(a=>`${a.type} op ${a.date} (${a.diff} dagen)`).join(' · ')}</div>`; return html;}
function renderMain(tab){const main=document.getElementById('main'); if(tab==='dashboard') main.innerHTML=dashboardHtml(); else if(tab==='project') main.innerHTML=projectHtml(); else if(tab==='kpis') main.innerHTML=kpiHtml(); else if(tab.startsWith('cat-')) main.innerHTML=categoryHtml(tab.replace('cat-','')); else if(tab==='rapportage') main.innerHTML=rapportageHtml(); else if(tab==='data') main.innerHTML=dataHtml(); setTimeout(afterRender,0)}
function dashboardHtml(){const totals=CATS.map(c=>({c,s:sumFor(c.id)})); const participants=totals.reduce((s,x)=>s+x.s.participants,0), unique=totals.reduce((s,x)=>s+x.s.unique,0), registered=totals.reduce((s,x)=>s+x.s.registered,0), due=dueOccurrences().length; return `<section class="section active">${alertsHtml()}<div class="topbar"><div><div class="kicker">Overzicht</div><h2>Impactdashboard</h2><p>Resultaten, samenwerkingen, financiële voortgang en projectplanning.</p></div><div class="actions"><button class="btn" onclick="exportJson()">Back-up JSON</button><button class="btn primary" onclick="window.print()">Print / PDF</button></div></div><div class="grid kpis"><div class="card tile"><small>Deelnemers</small><div class="val">${fmt(participants)}</div><span class="pill green">geregistreerd</span></div><div class="card tile"><small>Unieke deelnemers</small><div class="val">${fmt(unique)}</div><span class="pill blue">bereik</span></div><div class="card tile"><small>Activiteiten geregistreerd</small><div class="val">${fmt(registered)}</div><span class="pill gray">uitgevoerd</span></div><div class="card tile"><small>Registraties nodig</small><div class="val">${fmt(due)}</div><span class="pill ${due?'red':'green'}">${due?'actie nodig':'bijgewerkt'}</span></div></div><div class="layout"><div class="card"><h3>Deelnemers per categorie</h3><div class="canvasBox"><canvas id="chartCats"></canvas></div></div><div class="card"><h3>KPI-stoplichten</h3>${kpiStoplightsHtml()}</div></div><div class="split" style="margin-top:17px"><div class="card"><h3>Samenwerkingspartners</h3>${partnersDashboardHtml()}</div><div class="card"><h3>Financiële status</h3>${financeDashboardHtml()}</div></div><div class="card" style="margin-top:17px"><h3>Financiële uitgaven uploaden</h3><p class="mini">Upload een Excel- of CSV-bestand met datum, omschrijving, categorie, bedrag, btw en leverancier.</p><div class="inline"><input type="file" id="expensesUpload" accept=".xlsx,.xls,.csv"><button class="btn primary" onclick="importExpenses()">Uitgaven uploaden</button><button class="btn" onclick="downloadExpensesTemplate()">Template CSV</button><button class="btn" onclick="downloadCSV('expenses')">Uitgaven exporteren</button></div></div><div class="card" style="margin-top:17px"><h3>Proces-tijdbalk</h3>${timelineHtml()}</div></section>`}
function allPartners(){let values=state.activities.map(a=>a.partner||''); Object.values(state.registrations||{}).forEach(r=>values.push(r.partners||'')); return [...new Set(values.flatMap(v=>String(v).split(/[;,\n]/)).map(x=>x.trim()).filter(Boolean))].sort((a,b)=>a.localeCompare(b,'nl'))}
function partnersDashboardHtml(){let list=allPartners(); if(!list.length)return'<div class="empty">Nog geen samenwerkingspartners genoemd.</div>'; return `<div class="inline">${list.map(p=>`<span class="pill blue">${escapeHtml(p)}</span>`).join('')}</div><p class="mini">${list.length} unieke samenwerkingspartner(s)</p>`}
function categoryPartners(cat){let values=state.activities.filter(a=>a.category===cat).map(a=>a.partner||'');categoryRows(cat).filter(r=>r.reg).forEach(r=>values.push(r.reg.partners||''));return[...new Set(values.flatMap(v=>String(v).split(/[;,\n]/)).map(x=>x.trim()).filter(Boolean))].sort((a,b)=>a.localeCompare(b,'nl'))}
function categoryPartnersHtml(cat){let list=categoryPartners(cat);if(!list.length)return'<div class="empty">Nog geen samenwerkingspartners genoemd voor deze categorie.</div>';return `<div class="inline">${list.map(p=>`<span class="pill blue">${escapeHtml(p)}</span>`).join('')}</div><p class="mini">${list.length} unieke samenwerkingspartner(s) binnen ${catName(cat)}</p>`}
function expenseTotal(){return (state.expenses||[]).reduce((s,e)=>s+(+e.amount||0),0)}
function money(n){return new Intl.NumberFormat('nl-NL',{style:'currency',currency:'EUR'}).format(+n||0)}
function financeDashboardHtml(){let budget=+state.project.subsidieBedrag||0, spent=expenseTotal(), pct=budget?spent/budget*100:0, color=pct>100?'red':pct>=80?'orange':'green'; return `<div class="grid"><div><span class="mini">Totaal budget</span><div class="val" style="font-size:26px">${money(budget)}</div></div><div><span class="pill ${color}">${Math.round(pct)}% besteed</span></div></div>`}
function hoursByCategory(){return CATS.map(c=>(state.hours||[]).filter(h=>h.category===c.id).reduce((s,h)=>s+(+h.hours||0),0))}
function safety4vHtml(){return `<div class="card" style="margin-top:17px"><h3>Monitor Sociale Veiligheid: de 4V’s</h3><div class="layout"><div class="canvasBox"><canvas id="chart4v"></canvas></div><div><p class="mini">Upload per vereniging of wordt voldaan aan VOG, vertrouwenscontactpersoon, gedragscode en vakkundige trainer-coaches.</p><div class="inline"><input type="file" id="safety4vUpload" accept=".xlsx,.xls,.csv"><button class="btn primary" onclick="importSafety4v()">4V-monitor uploaden</button><button class="btn" onclick="downloadSafety4vTemplate()">4V-template</button></div>${safety4vTable()}</div></div></div>`}
function safety4vTable(){let rows=state.safety4v||[]; if(!rows.length)return'<div class="empty" style="margin-top:14px">Nog geen verenigingen geïmporteerd.</div>'; return `<table class="table" style="margin-top:14px"><thead><tr><th>Vereniging</th><th>Score</th></tr></thead><tbody>${rows.map(r=>`<tr><td>${escapeHtml(r.club)}</td><td>${[r.vog,r.vcp,r.code,r.coaches].filter(Boolean).length}/4</td></tr>`).join('')}</tbody></table>`}
function kpiStoplightsHtml(category){let list=state.kpis.filter(k=>!category||k.category===category); if(!list.length)return'<div class="empty">Nog geen KPI’s.</div>'; return list.map(k=>{let v=metricValue(k), pct=k.target?Math.min(100,v/k.target*100):0, s=statusFor(pct); return `<div style="margin-bottom:14px"><div style="display:flex;justify-content:space-between;gap:10px"><strong>${escapeHtml(k.name)}</strong><span class="pill ${s}"><span class="dot ${s}"></span>${Math.round(pct)}%</span></div><div class="mini">${catName(k.category)} · ${fmt(v)} van ${fmt(k.target)} · ${statusLabel(s)}</div><div class="meter ${s==='orange'?'orange':s==='red'?'red':''}"><span style="width:${Math.min(100,pct)}%"></span></div></div>`}).join('')}
const originalDashboardHtml=dashboardHtml;
dashboardHtml=function(){let html=originalDashboardHtml(); html=html.replace(/<div class="split" style="margin-top:17px"><div class="card"><h3>Samenwerkingspartners<\/h3>[\s\S]*?<h3>Financiële status<\/h3>[\s\S]*?<\/div><\/div>/,''); html=html.replace(/<div class="card" style="margin-top:17px"><h3>Financiële uitgaven uploaden<\/h3>[\s\S]*?<\/div><\/div>/,''); return html.replace('<div class="card" style="margin-top:17px"><h3>Proces-tijdbalk</h3>',`<div class="split" style="margin-top:17px"><div class="card"><h3>Subsidie/aanbesteding budget</h3>${financeDashboardHtml()}<div class="canvasBox"><canvas id="chartFinance"></canvas></div><div class="inline"><input type="file" id="expensesUpload" accept=".xlsx,.xls,.csv"><button class="btn primary" onclick="importExpenses()">Uitgaven uploaden</button><button class="btn" onclick="downloadExpensesTemplate()">Uitgaven-template</button></div></div><div class="card"><h3>Urenstatus per categorie</h3><div class="canvasBox"><canvas id="chartHours"></canvas></div><div class="inline"><input type="file" id="hoursUpload" accept=".xlsx,.xls,.csv"><button class="btn primary" onclick="importHours()">Uren uploaden</button><button class="btn" onclick="downloadHoursTemplate()">Uren-template</button></div></div></div><div class="split" style="margin-top:17px"><div class="card"><h3>Samenwerkingspartners</h3>${partnersDashboardHtml()}</div><div class="card"><h3>Sociale Veiligheidsmonitor</h3><div class="canvasBox"><canvas id="chart4vDashboard"></canvas></div><div class="inline"><input type="file" id="safety4vDashboardUpload" accept=".xlsx,.xls,.csv"><button class="btn primary" onclick="importSafety4v('safety4vDashboardUpload')">4V-monitor uploaden</button><button class="btn" onclick="downloadSafety4vTemplate()">4V-template</button></div></div></div><div class="card" style="margin-top:17px"><h3>Proces-tijdbalk</h3>`)}
function categoryKpiOverview(cat){let list=state.kpis.filter(k=>k.category===cat); if(!list.length)return'<div class="empty">Nog geen KPI’s voor deze categorie.</div>'; return `<div class="grid">${list.map(k=>{let v=metricValue(k), pct=k.target?Math.min(100,v/k.target*100):0, s=statusFor(pct); return `<div class="notice"><div style="display:flex;justify-content:space-between;gap:10px"><strong>${escapeHtml(k.name)}</strong><span class="pill ${s}"><span class="dot ${s}"></span>${Math.round(pct)}%</span></div><p><strong>Doelwaarde:</strong> ${fmt(k.target)}<br><strong>Meetmethode:</strong> ${escapeHtml(metricLabel(k.metric))}<br><strong>Toelichting:</strong> ${escapeHtml(k.toelichting||'Geen toelichting ingevuld.')}</p><div class="mini">Voortgang: ${fmt(v)} van ${fmt(k.target)} · ${statusLabel(s)}</div><div class="meter ${s==='orange'?'orange':s==='red'?'red':''}"><span style="width:${Math.min(100,pct)}%"></span></div></div>`}).join('')}</div>`}
function timelineHtml(){const ev=projectEvents(), now=new Date(); if(!ev.length)return'<div class="empty">Vul projectdatums in om de tijdbalk te tonen.</div>'; return `<div class="timeline">${ev.map(e=>{let d=new Date(e.date), diff=Math.ceil((d-now)/86400000), cls=d<now?'done':(e.reminderDays>0&&diff<=e.reminderDays?'now':''); return `<div class="tl ${cls}"><strong>${escapeHtml(e.type)}</strong><small>${e.date}${cls==='now'?' · binnenkort actie nodig':''}</small></div>`}).join('')}</div>`}
function projectActionButton(locked){return locked?'<button class="btn primary project-action" onclick="editProject()">Projectgegevens bewerken</button>':'<button class="btn primary project-action" onclick="saveProject()">Projectgegevens opslaan</button>'}
function projectHtml(){const p=state.project, locked=p.vergrendeld===true, dis=locked?'disabled':''; return `<section class="section active">${alertsHtml()}<div class="topbar"><div><div class="kicker">Project</div><h2>Projectinstellingen & verantwoordingsplanning</h2><p>Leg looptijd, rapportagemomenten, subsidie, deadline en verantwoordingsvorm vast.</p></div><div class="actions"><button class="btn" onclick="requestNotifications()">Meldingen toestaan</button></div></div>${locked?'<div class="notice" style="margin-bottom:17px"><strong>Projectgegevens zijn opgeslagen en vergrendeld.</strong> Klik op Projectgegevens bewerken om wijzigingen te maken.</div>':''}<div class="card" style="margin-bottom:17px"><h3>Waar zijn we in het proces?</h3>${timelineHtml()}<div class="notice" style="margin-top:14px">Standaard verschijnt een melding 30 dagen voor een kwartaalrapportage en 90 dagen voor de eindverantwoording. Deze termijnen zijn aanpasbaar.</div></div><div class="card"><div class="project-card-head"><h3>Projectparameters</h3>${projectActionButton(locked)}</div><div class="formgrid"><div class="field"><label>Naam gemeenteproject</label><input ${dis} id="p_naam" value="${escapeHtml(p.naam)}"></div><div class="field"><label>Gemeente</label><input ${dis} id="p_gemeente" value="${escapeHtml(p.gemeente)}"></div><div class="field"><label>Projectleider</label><input ${dis} id="p_projectleider" value="${escapeHtml(p.projectleider)}"></div><div class="field"><label>Financiering</label><input ${dis} id="p_financiering" value="${escapeHtml(p.financiering)}"></div><div class="field"><label>Subsidiebedrag in euro's</label><input ${dis} type="number" min="0" step="0.01" id="p_subsidieBedrag" value="${escapeHtml(p.subsidieBedrag||'')}" placeholder="Bijv. 25000"></div><div class="field"><label>BTW</label><select ${dis} id="p_btwStatus"><option value="incl" ${p.btwStatus!=='excl'?'selected':''}>Inclusief btw</option><option value="excl" ${p.btwStatus==='excl'?'selected':''}>Exclusief btw</option></select></div><div class="field"><label>Looptijd start</label><input ${dis} type="date" id="p_looptijdStart" value="${p.looptijdStart||''}"></div><div class="field"><label>Looptijd einde</label><input ${dis} type="date" id="p_looptijdEind" value="${p.looptijdEind||''}"></div><div class="field full"><label>Afspraken kwartaalrapportages</label><input type="hidden" id="p_kwartaalDatums" value="${escapeHtml(p.kwartaalDatums||'')}"><div class="inline"><input ${dis} type="date" id="newQuarterDate"><button ${dis} class="btn" onclick="addQuarterDate()">Toevoegen</button></div><div class="quarter-list" id="quarterDates">${quarterDatesHtml(p.kwartaalDatums,locked)}</div></div><div class="field"><label>Deadline eindverantwoording</label><input ${dis} type="date" id="p_deadlineVerantwoording" value="${p.deadlineVerantwoording||''}"></div><div class="field"><label>Verantwoording</label><select ${dis} id="p_typeVerantwoording"><option value="financieel_rapportage" ${p.typeVerantwoording==='financieel_rapportage'?'selected':''}>Financieel + rapportage</option><option value="rapportage" ${p.typeVerantwoording==='rapportage'?'selected':''}>Alleen rapportage</option></select></div><div class="field"><label>Melding kwartaalrapportage (dagen vooraf)</label><input ${dis} type="number" min="1" id="p_meldingKwartaalDagen" value="${p.meldingKwartaalDagen||30}"></div><div class="field"><label>Melding eindverantwoording (dagen vooraf)</label><input ${dis} type="number" min="1" id="p_meldingEindDagen" value="${p.meldingEindDagen||90}"></div><div class="field full"><label>Overige aantekeningen</label><textarea ${dis} id="p_overigeAantekeningen" placeholder="Ruimte voor aanvullende afspraken en opmerkingen">${escapeHtml(p.overigeAantekeningen||'')}</textarea></div></div><div class="project-savebar">${projectActionButton(locked)}</div></div></section>`}
function kpiHtml(){return `<section class="section active">${alertsHtml()}<div class="topbar"><div><div class="kicker">KPI’s</div><h2>KPI’s & stoplichtmethode</h2><p>Open een categorie om KPI’s toe te voegen, aan te passen en activiteiten eraan te koppelen.</p></div></div><div class="card"><h3>KPI’s per categorie</h3>${kpiTable()}</div><div class="split" style="margin-top:17px"><div class="card"><h3>KPI’s uploaden vanuit Excel</h3><p class="mini">Kolommen: categorie, kpi, doelwaarde, meetmethode en toelichting.</p><div class="inline"><input type="file" id="kpiUpload" accept=".xlsx,.xls,.csv"><button class="btn primary" onclick="importKpis()">KPI’s uploaden</button><button class="btn" onclick="downloadKpiTemplate()">KPI-template CSV</button></div></div><div class="card"><h3>Activiteiten uploaden vanuit Excel</h3><p class="mini">Kolommen: categorie, kpi, kwartaal, titel, type, datum, startdatum, einddatum, frequentie, tijd, wijk, doelgroep, partner en verwacht.</p><div class="inline"><input type="file" id="kpiActivitiesUpload" accept=".xlsx,.xls,.csv"><button class="btn primary" onclick="importKpiActivities()">Activiteiten uploaden</button><button class="btn" onclick="downloadKpiActivityTemplate()">Activiteiten-template CSV</button></div></div></div></section>`}
function kpiTable(){if(!state.kpis.length)return'<div class="empty">Geen KPI’s.</div>'; return `<div class="kpi-accordion">${CATS.map(categoryKpiDetailHtml).join('')}</div>`}
function categoryKpiDetailHtml(c){let kpis=state.kpis.filter(k=>k.category===c.id), acts=state.activities.filter(a=>a.category===c.id&&a.kpiId); return `<details class="kpi-detail category-detail"><summary><div><strong>${c.icon} ${c.name}</strong><div class="kpi-summary-meta"><span class="pill blue">${kpis.length} KPI('s)</span><span class="pill gray">${acts.length} gekoppelde activiteit(en)</span></div></div></summary><div class="kpi-detail-body">${kpis.length?kpis.map(kpiDetailHtml).join(''):'<div class="empty">Nog geen KPI’s in deze categorie.</div>'}<div class="inline" style="margin-top:16px"><details><summary class="btn primary" style="display:inline-block">KPI toevoegen</summary><div style="margin-top:14px">${categoryKpiForm(c.id)}</div></details><details><summary class="btn primary" style="display:inline-block">Activiteit toevoegen</summary><div style="margin-top:14px">${categoryActivityForm(c.id)}</div></details></div></div></details>`}
function categoryKpiForm(cat){let x='newk_'+cat; return `<div class="formgrid"><div class="field"><label>KPI-naam</label><input id="${x}_name" placeholder="Bijv. 200 jongeren bereikt"></div><div class="field"><label>Doelwaarde</label><input id="${x}_target" type="number" min="0" value="100"></div><div class="field"><label>Meetmethode</label><select id="${x}_metric">${metricOptions()}</select></div><div class="field full"><label>Toelichting</label><textarea id="${x}_toelichting" placeholder="Maximaal 50 woorden"></textarea></div><div class="full"><button class="btn primary" onclick="addCategoryKpi('${cat}')">KPI toevoegen aan ${catName(cat)}</button></div></div>`}
function kpiContextHtml(k){return `<table class="table"><thead><tr><th>Categorie</th><th>KPI</th><th>Doelwaarde</th><th>Meetmethode</th><th>Toelichting</th></tr></thead><tbody><tr><td>${catName(k.category)}</td><td>${escapeHtml(k.name)}</td><td>${fmt(k.target)}</td><td>${escapeHtml(metricLabel(k.metric))}</td><td>${escapeHtml(k.toelichting||'-')}</td></tr></tbody></table>`}
function kpiDetailHtml(k){let v=metricValue(k), pct=k.target?Math.min(100,v/k.target*100):0, s=statusFor(pct), acts=state.activities.filter(a=>a.kpiId===k.id); return `<div class="kpi-with-activities"><div style="display:flex;justify-content:space-between;gap:12px;align-items:flex-start"><div><h3>${escapeHtml(k.name)}</h3><div class="kpi-summary-meta"><span class="pill ${s}"><span class="dot ${s}"></span>${Math.round(pct)}%</span><span class="pill gray">${acts.length} activiteit(en)</span></div></div><div class="inline"><details><summary class="btn small" style="display:inline-block">Aanpassen</summary><div style="margin-top:14px">${editKpiForm(k)}</div></details><button class="btn small danger" onclick="deleteKpi('${k.id}')">Verwijderen</button></div></div>${kpiContextHtml(k)}<div class="notice" style="margin-top:14px"><strong>Voortgang:</strong> ${fmt(v)} van ${fmt(k.target)}</div><details style="margin-top:16px"><summary class="btn" style="display:inline-block">Activiteiten (${acts.length})</summary><div style="margin-top:14px">${kpiActivitiesTable(k.id)}</div></details></div>`}
function editKpiForm(k){let x='editk_'+k.id; return `<div class="formgrid"><div class="field"><label>KPI-naam</label><input id="${x}_name" value="${escapeHtml(k.name)}"></div><div class="field"><label>Doelwaarde</label><input id="${x}_target" type="number" min="0" value="${k.target||0}"></div><div class="field"><label>Meetmethode</label><select id="${x}_metric">${metricOptions(k.metric)}</select></div><div class="field full"><label>Toelichting</label><textarea id="${x}_toelichting">${escapeHtml(k.toelichting||'')}</textarea></div><div class="full"><button class="btn primary" onclick="updateKpi('${k.id}')">Wijzigingen opslaan</button></div></div>`}
function kpiActivityForm(k){let x='kpa_'+k.id; return `<div class="formgrid"><div class="field full"><label>Titel activiteit</label><input id="${x}_title" placeholder="Bijv. Naschoolse sportmix"></div><div class="field"><label>Kwartaal</label><select id="${x}_quarter"><option>Q1</option><option>Q2</option><option>Q3</option><option>Q4</option></select></div><div class="field"><label>Type</label><select id="${x}_type" onchange="toggleKpiActivityDates('${k.id}')"><option value="single">Eenmalig</option><option value="recurring">Herhaaldelijk</option></select></div><div class="field"><label>Tijd</label><input type="time" id="${x}_time" value="15:00"></div><div class="field kpa_single_${k.id}"><label>Datum</label><input type="date" id="${x}_date" value="${todayISO()}"></div><div class="field kpa_recur_${k.id}" style="display:none"><label>Startdatum</label><input type="date" id="${x}_start" value="${todayISO()}"></div><div class="field kpa_recur_${k.id}" style="display:none"><label>Einddatum</label><input type="date" id="${x}_end" value="${todayISO()}"></div><div class="field kpa_recur_${k.id}" style="display:none"><label>Frequentie</label><select id="${x}_freq"><option value="weekly">Wekelijks</option><option value="biweekly">Tweewekelijks</option><option value="monthly">Maandelijks</option></select></div><div class="field"><label>Wijk / kern</label><input id="${x}_wijk"></div><div class="field"><label>Doelgroep</label><input id="${x}_doelgroep"></div><div class="field"><label>Partner / uitvoerder</label><input id="${x}_partner"></div><div class="field"><label>Verwachte deelnemers</label><input type="number" id="${x}_expected" value="20"></div><div class="full"><button class="btn primary" onclick="addKpiActivity('${k.id}')">Activiteit toevoegen aan KPI</button></div></div>`}
function categoryActivityForm(cat){let kpis=state.kpis.filter(k=>k.category===cat); if(!kpis.length)return'<div class="empty">Voeg eerst een KPI toe aan deze categorie.</div>'; return `<div class="field" style="margin-bottom:13px"><label>KPI</label><select id="catActivityKpi_${cat}">${kpis.map(k=>`<option value="${k.id}">${escapeHtml(k.name)}</option>`).join('')}</select></div>${kpiActivityForm(kpis[0]).replace(`addKpiActivity('${kpis[0].id}')`,`addCategoryActivity('${cat}')`).replace('Activiteit toevoegen aan KPI','Activiteit toevoegen')}`}
function kpiActivitiesTable(kpiId){let list=state.activities.filter(a=>a.kpiId===kpiId); if(!list.length)return'<div class="empty">Nog geen activiteiten aan deze KPI gekoppeld.</div>'; return `<table class="table"><thead><tr><th>Kwartaal</th><th>Activiteit</th><th>Type</th><th>Planning</th><th>Partner</th><th></th></tr></thead><tbody>${list.map(a=>`<tr><td><span class="pill blue">${a.quarter||'-'}</span></td><td>${escapeHtml(a.title)}</td><td>${a.type==='recurring'?'Herhaaldelijk':'Eenmalig'}</td><td>${a.type==='recurring'?`${a.startDate} t/m ${a.endDate}`:a.date}</td><td>${escapeHtml(a.partner||'')}</td><td><div class="inline"><button class="btn small" onclick="openActivityEdit('${a.id}')">Aanpassen</button><button class="btn small danger" onclick="deleteActivity('${a.id}')">Verwijderen</button></div></td></tr>`).join('')}</tbody></table>`}
function categoryHtml(cat){const c=CATS.find(x=>x.id===cat), s=sumFor(cat), due=dueOccurrences().filter(o=>o.category===cat); let text=state.reports[cat]||''; return `<section class="section active"><div class="cat-head"><div><div class="kicker">Categorie</div><h2>${c.icon} ${c.name}</h2><p>Dashboard, KPI’s, activiteiten en registraties voor ${c.name}.</p></div><span class="cat-badge">${c.name}</span></div><div class="card"><h3>Dashboard ${c.name}</h3><div class="grid kpis"><div class="card tile"><small>Deelnemers</small><div class="val">${fmt(s.participants)}</div></div><div class="card tile"><small>Unieke deelnemers</small><div class="val">${fmt(s.unique)}</div></div><div class="card tile"><small>Geregistreerde momenten</small><div class="val">${fmt(s.registered)}</div></div><div class="card tile"><small>Openstaande registraties</small><div class="val">${fmt(due.length)}</div><span class="pill ${due.length?'red':'green'}">${due.length?'actie nodig':'bijgewerkt'}</span></div></div></div><div class="card" style="margin-top:17px"><h3>KPI’s</h3>${categoryKpiOverview(cat)}</div><div class="card" style="margin-top:17px"><h3>Activiteiten gekoppeld aan KPI’s</h3><div class="notice">Open een KPI om de gekoppelde activiteiten en losse uitvoeringsmomenten te bekijken.</div>${categoryActivitiesByKpi(cat)}</div><div class="card" style="margin-top:17px"><h3>Openstaande registraties</h3>${openRegistrationsTable(cat)}<details style="margin-top:16px"><summary class="btn" style="display:inline-block">Afgeronde registraties bekijken</summary><div style="margin-top:14px">${registrationsTable(cat)}</div></details></div><div class="card" style="margin-top:17px"><h3>Upload- en invoeropties</h3><div class="split"><div><h3>Activiteit handmatig invoeren</h3>${activityForm(cat)}</div><div><h3>Activiteiten uploaden vanuit Excel</h3><p class="mini">Upload een .xlsx-bestand of CSV. Herhaalde activiteiten worden automatisch verdeeld in losse registratiemomenten.</p><div class="inline"><input type="file" id="upload_${cat}" accept=".xlsx,.xls,.csv"><button class="btn primary" onclick="importActivities('${cat}')">Uploaden</button><button class="btn" onclick="downloadActivityTemplate('${cat}')">Template CSV</button></div><h3 style="margin-top:22px">Rapportagetekst</h3><textarea id="report_${cat}" maxlength="800" oninput="limitWords('${cat}')" placeholder="Beschrijf de activiteiten en resultaten in maximaal 100 woorden.">${escapeHtml(text)}</textarea><div class="wordcount" id="wc_${cat}">${wordCount(text)}/100 woorden</div><button class="btn primary" onclick="saveReportText('${cat}')">Tekst opslaan</button></div></div></div></section>`}
function activityForm(cat){return `<div class="formgrid"><div class="field full"><label>Titel activiteit</label><input id="a_title_${cat}" placeholder="Bijv. Naschoolse sportmix"></div><div class="field"><label>Type</label><select id="a_type_${cat}" onchange="toggleActivityDates('${cat}')"><option value="single">Eenmalig</option><option value="recurring">Herhaaldelijk</option></select></div><div class="field"><label>Tijd</label><input type="time" id="a_time_${cat}" value="15:00"></div><div class="field single_${cat}"><label>Datum</label><input type="date" id="a_date_${cat}" value="${todayISO()}"></div><div class="field recur_${cat}" style="display:none"><label>Startdatum</label><input type="date" id="a_start_${cat}" value="${todayISO()}"></div><div class="field recur_${cat}" style="display:none"><label>Einddatum</label><input type="date" id="a_end_${cat}" value="${todayISO()}"></div><div class="field recur_${cat}" style="display:none"><label>Frequentie</label><select id="a_freq_${cat}"><option value="weekly">Wekelijks</option><option value="biweekly">Tweewekelijks</option><option value="monthly">Maandelijks</option></select></div><div class="field"><label>Wijk / kern</label><input id="a_wijk_${cat}" placeholder="Bijv. Noord"></div><div class="field"><label>Doelgroep</label><input id="a_doelgroep_${cat}" placeholder="Bijv. groep 5-8"></div><div class="field"><label>Partner / uitvoerder</label><input id="a_partner_${cat}" placeholder="Bijv. buurtsportcoach / vereniging"></div><div class="field"><label>Verwachte deelnemers</label><input type="number" id="a_expected_${cat}" value="20"></div><div class="full"><button class="btn primary" onclick="addActivity('${cat}')">Activiteit toevoegen</button></div></div>`}
function activitiesTable(cat){let list=state.activities.filter(a=>a.category===cat); if(!list.length)return'<div class="empty">Nog geen activiteiten ingevoerd.</div>'; return `<table class="table"><thead><tr><th>Titel</th><th>Kwartaal</th><th>Type</th><th>Planning</th><th>Wijk</th><th>Verwacht</th><th>Momenten</th><th></th></tr></thead><tbody>${list.map(a=>`<tr><td>${escapeHtml(a.title)}</td><td>${a.quarter?`<span class="pill blue">${a.quarter}</span>`:'-'}</td><td>${a.type==='recurring'?'Herhaaldelijk':'Eenmalig'}</td><td>${a.type==='recurring'?`${a.startDate} t/m ${a.endDate} · ${a.frequency}`:a.date} ${a.time||''}</td><td>${escapeHtml(a.wijk)}</td><td>${fmt(a.expected)}</td><td>${calcOccurrences(a).length}</td><td><button class="btn small danger" onclick="deleteActivity('${a.id}')">Verwijder</button></td></tr>`).join('')}</tbody></table>`}
function occurrencesPlanningTable(cat){let rows=categoryRows(cat); if(!rows.length)return'<div class="empty" style="margin-top:14px">Nog geen activiteitenmomenten gepland.</div>'; return `<table class="table" style="margin-top:14px"><thead><tr><th>Datum</th><th>Activiteit</th><th>KPI</th><th>Kwartaal</th><th>Type</th><th>Status</th><th></th></tr></thead><tbody>${rows.map(r=>{let past=dt(r,r.occDate)<new Date(), k=state.kpis.find(k=>k.id===r.kpiId); return `<tr><td>${r.occDate} ${r.time||''}</td><td>${escapeHtml(r.title)}</td><td>${escapeHtml(k?.name||'-')}</td><td>${r.quarter||'-'}</td><td>${r.type==='recurring'?'Herhaald moment':'Eenmalig'}</td><td><span class="pill ${r.registered?'green':past?'red':'blue'}">${r.registered?'Geregistreerd':past?'Registratie nodig':'Gepland'}</span></td><td>${past?`<button class="btn small ${r.registered?'':'primary'}" onclick="openRegistration('${r.occurrenceId}')">${r.registered?'Aanpassen':'Registreren'}</button>`:''}</td></tr>`}).join('')}</tbody></table>`}
function categoryActivitiesByKpi(cat){let kpis=state.kpis.filter(k=>k.category===cat), unlinked=categoryRows(cat).filter(r=>!r.kpiId); let html=`<div class="kpi-accordion" style="margin-top:14px">${kpis.map(k=>categoryKpiActivitiesGroup(k)).join('')}</div>`; if(unlinked.length)html+=`<details class="kpi-detail" style="margin-top:12px"><summary><div><strong>Niet aan een KPI gekoppeld</strong><div class="kpi-summary-meta"><span class="pill gray">${unlinked.length} uitvoeringsmoment(en)</span></div></div></summary><div class="kpi-detail-body">${occurrencesRowsTable(unlinked,false)}</div></details>`; return html}
function categoryKpiActivitiesGroup(k){let activities=state.activities.filter(a=>a.kpiId===k.id), rows=categoryRows(k.category).filter(r=>r.kpiId===k.id), v=metricValue(k), pct=k.target?Math.min(100,v/k.target*100):0, s=statusFor(pct); return `<details class="kpi-detail"><summary><div><strong>${escapeHtml(k.name)}</strong><div class="kpi-summary-meta"><span class="pill ${s}"><span class="dot ${s}"></span>${Math.round(pct)}%</span><span class="pill blue">${activities.length} activiteit(en)</span><span class="pill gray">${rows.length} uitvoeringsmoment(en)</span></div></div></summary><div class="kpi-detail-body"><div class="notice"><strong>Doelwaarde:</strong> ${fmt(k.target)} · <strong>Meetmethode:</strong> ${escapeHtml(metricLabel(k.metric))}<br><strong>Toelichting:</strong> ${escapeHtml(k.toelichting||'Geen toelichting ingevuld.')}</div>${occurrencesRowsTable(rows,false)}</div></details>`}
function occurrencesRowsTable(rows,showKpi=true){if(!rows.length)return'<div class="empty" style="margin-top:14px">Nog geen activiteitenmomenten gepland.</div>'; return `<table class="table" style="margin-top:14px"><thead><tr><th>Datum</th><th>Activiteit</th>${showKpi?'<th>KPI</th>':''}<th>Kwartaal</th><th>Type</th><th>Status</th><th></th></tr></thead><tbody>${rows.map(r=>{let past=dt(r,r.occDate)<new Date(), k=state.kpis.find(k=>k.id===r.kpiId); return `<tr><td>${r.occDate} ${r.time||''}</td><td>${escapeHtml(r.title)}</td>${showKpi?`<td>${escapeHtml(k?.name||'-')}</td>`:''}<td>${r.quarter||'-'}</td><td>${r.type==='recurring'?'Herhaald moment':'Eenmalig'}</td><td><span class="pill ${r.registered?'green':past?'red':'blue'}">${r.registered?'Geregistreerd':past?'Registratie nodig':'Gepland'}</span></td><td>${past?`<button class="btn small ${r.registered?'':'primary'}" onclick="openRegistration('${r.occurrenceId}')">${r.registered?'Aanpassen':'Registreren'}</button>`:''}</td></tr>`}).join('')}</tbody></table>`}
function openRegistrationsTable(cat){let rows=dueOccurrences().filter(o=>o.category===cat); if(!rows.length)return'<div class="empty">Geen openstaande registraties. Alles is bijgewerkt.</div>'; return `<table class="table"><thead><tr><th>Uitgevoerd op</th><th>Activiteit</th><th>KPI</th><th>Kwartaal</th><th>Verwacht</th><th></th></tr></thead><tbody>${rows.map(r=>{let k=state.kpis.find(k=>k.id===r.kpiId); return `<tr><td>${r.occDate} ${r.time||''}</td><td>${escapeHtml(r.title)}${r.type==='recurring'?'<br><span class="mini">Herhaald uitvoeringsmoment</span>':''}</td><td>${escapeHtml(k?.name||'-')}</td><td>${r.quarter||'-'}</td><td>${fmt(r.expected)}</td><td><button class="btn small primary" onclick="openRegistration('${r.occurrenceId}')">Deelnemers registreren</button></td></tr>`}).join('')}</tbody></table>`}
function registrationsTable(cat){let rows=categoryRows(cat).filter(r=>r.reg); if(!rows.length)return'<div class="empty">Nog geen registraties.</div>'; return `<table class="table"><thead><tr><th>Datum</th><th>Activiteit</th><th>Meetmethode</th><th>Gemeten resultaat</th><th>Samenwerkingspartners</th><th>Doorstroom</th></tr></thead><tbody>${rows.map(r=>{let k=state.kpis.find(k=>k.id===r.kpiId); return `<tr><td>${r.occDate}</td><td>${escapeHtml(r.title)}</td><td>${escapeHtml(metricLabel(k?.metric||'activities'))}</td><td>${escapeHtml(registrationResult(r.reg,k?.metric))}</td><td>${escapeHtml(r.reg.partners||'-')}</td><td>${r.reg.flow?fmt(r.reg.flow):'-'}</td></tr>`}).join('')}</tbody></table>`}
function registrationResult(reg,metric){if(metric==='participants')return fmt(reg.participants); if(metric==='activities')return'Uitgevoerd'; if(metric==='flow')return fmt(reg.flow); if(metric==='partners')return reg.partners||'-'; if(metric==='hours')return fmt(reg.hours)+' uur'; return'Geregistreerd'}
function reportQuarter(){return state.reportQuarter||'Q1'}
function setReportQuarter(q){state.reportQuarter=q; save()}
function reportTheme(){return state.reportTheme||{primary:'#147a73',accent:'#41a36f',cover:'#0e2d3e'}}
function setReportColor(key,value){state.reportTheme={...reportTheme(),[key]:value};save()}
function reportStyle(){let t=reportTheme();return `--report-primary:${t.primary};--report-accent:${t.accent};--report-cover:${t.cover}`}
function reportFooter(label){return `<div class="report-footer"><span>${escapeHtml(state.project.naam)} · ${reportQuarter()}</span><span>${escapeHtml(label)}</span></div>`}
function reportRows(cat){return categoryRows(cat).filter(r=>r.quarter===reportQuarter())}
function reportSum(cat){let rows=reportRows(cat),regs=rows.map(r=>r.reg).filter(Boolean);return{moments:rows.length,registered:regs.length,participants:regs.reduce((s,r)=>s+(+r.participants||0),0),flow:regs.reduce((s,r)=>s+(+r.flow||0),0)}}
function rapportageHtml(){let q=reportQuarter(),t=reportTheme(); return `<section class="section active" id="rapportage"><div class="card no-print" style="margin-bottom:17px"><div class="topbar"><div><div class="kicker">Rapportage</div><h2>Kwartaalrapportage</h2><p>Kies het kwartaal en stel de kleuren van de PDF in.</p></div><div class="actions"><select onchange="setReportQuarter(this.value)">${['Q1','Q2','Q3','Q4'].map(x=>`<option ${x===q?'selected':''}>${x}</option>`).join('')}</select><button class="btn primary" onclick="window.print()">Print / PDF</button></div></div><div class="theme-settings"><label>Hoofdkleur<input type="color" value="${t.primary}" onchange="setReportColor('primary',this.value)"></label><label>Accentkleur<input type="color" value="${t.accent}" onchange="setReportColor('accent',this.value)"></label><label>Omslagkleur<input type="color" value="${t.cover}" onchange="setReportColor('cover',this.value)"></label></div></div>${reportDashboardPage()}${reportChartsPage()}${CATS.map(c=>reportPage(c.id)).join('')}</section>`}
function reportDashboardPage(){let q=reportQuarter(), budget=+state.project.subsidieBedrag||0,spent=expenseTotal(); return `<div class="report-page report-dashboard" style="${reportStyle()}"><div class="report-cover"><div class="kicker" style="color:#fff">Kwartaalrapportage ${q}</div><h2 style="color:#fff">${escapeHtml(state.project.naam)}</h2><p>${escapeHtml(state.project.gemeente)} · ${state.project.looptijdStart||'?'} t/m ${state.project.looptijdEind||'?'}</p></div><div class="grid kpis">${CATS.slice(0,4).map(c=>{let s=reportSum(c.id);return `<div class="card tile"><small>${c.name}</small><div class="val">${fmt(s.participants)}</div><span class="mini">deelnemers · ${s.registered}/${s.moments} geregistreerd</span></div>`}).join('')}</div><div class="split" style="margin-top:17px"><div class="card"><h3>Subsidie/aanbesteding budget</h3><div class="val">${money(spent)}</div><p>besteed van ${money(budget)}</p><div class="meter"><span style="width:${Math.min(100,budget?spent/budget*100:0)}%"></span></div></div><div class="card"><h3>Samenwerkingspartners</h3>${partnersDashboardHtml()}</div></div><div class="card" style="margin-top:17px"><h3>KPI-status</h3>${kpiStoplightsHtml()}</div>${reportFooter('Dashboard')}</div>`}
function reportChartsPage(){let budget=+state.project.subsidieBedrag||0,spent=expenseTotal(),maxHours=Math.max(...hoursByCategory(),1),safety=state.safety4v||[],maxSafety=Math.max(safety.length,1);return `<div class="report-page" style="${reportStyle()}"><div class="cat-head"><div><div class="kicker">${reportQuarter()} · overzicht</div><h2>Dashboarddiagrammen</h2></div><span class="cat-badge">Diagrammen</span></div><div class="report-chart-grid"><div class="report-chart-card"><h3>Deelnemers per categorie</h3>${reportBarList(CATS.map(c=>[c.name,reportSum(c.id).participants]))}</div><div class="report-chart-card"><h3>Uren per categorie</h3>${reportBarList(CATS.map((c,i)=>[c.name,hoursByCategory()[i]]),maxHours)}</div><div class="report-chart-card"><h3>Subsidie/aanbesteding budget</h3>${reportBudgetDonut(budget,spent)}</div><div class="report-chart-card"><h3>Sociale Veiligheid: 4V’s</h3>${reportBarList([['VOG',safety.filter(x=>x.vog).length],['Vertrouwenscontactpersoon',safety.filter(x=>x.vcp).length],['Gedragscode',safety.filter(x=>x.code).length],['Vakkundige coaches',safety.filter(x=>x.coaches).length]],maxSafety)}</div></div>${reportFooter('Dashboarddiagrammen')}</div>`}
function reportBudgetDonut(budget,spent){let pct=budget?Math.min(100,spent/budget*100):0,remaining=Math.max(0,budget-spent);return `<div class="report-donut" style="background:conic-gradient(var(--report-accent) 0 ${pct}%,#dbe5ef ${pct}% 100%)"><strong>${Math.round(pct)}%</strong></div><div class="report-donut-legend"><span>Besteed: ${money(spent)}</span><span>Resterend: ${money(remaining)}</span></div>`}
function reportBarList(items,max,format=fmt){max=max||Math.max(...items.map(x=>x[1]),1);return `<div class="report-bars">${items.map(([label,value])=>`<div class="report-bar"><span>${escapeHtml(label)}</span><div class="report-bar-track"><span style="width:${Math.min(100,value/max*100)}%"></span></div><strong>${format(value)}</strong></div>`).join('')}</div>`}
function reportPhotos(cat){let photos=categoryPhotos(cat);if(!photos.length)return'';return `<div class="report-photo-grid">${photos.map(p=>`<img src="${p.data}" alt="${escapeHtml(p.name)}">`).join('')}</div>`}
function reportPhotoControls(cat){return `<div class="report-photo-controls no-print"><strong>Foto’s voor ${catName(cat)}</strong><div class="inline" style="margin-top:7px"><input type="file" id="reportPhotos_${cat}" accept="image/*" multiple><button class="btn primary small" onclick="addCategoryPhotos('${cat}','reportPhotos_${cat}')">Foto’s toevoegen</button><span class="mini">${categoryPhotos(cat).length}/5 toegevoegd</span></div></div>`}
function reportSafety4v(){let rows=state.safety4v||[],max=Math.max(rows.length,1);return `<div class="card" style="margin-top:8px"><h3>Sociale Veiligheidsmonitor: 4V’s</h3>${reportBarList([['VOG',rows.filter(x=>x.vog).length],['Vertrouwenscontactpersoon',rows.filter(x=>x.vcp).length],['Gedragscode',rows.filter(x=>x.code).length],['Vakkundige coaches',rows.filter(x=>x.coaches).length]],max)}</div>`}
function reportPage(cat){const c=CATS.find(x=>x.id===cat), s=reportSum(cat), text=state.reports[cat]||'Nog geen toelichting ingevuld.', rows=reportRows(cat); return `<div class="report-page" style="${reportStyle()}">${reportPhotoControls(cat)}<div class="cat-head"><div><div class="kicker">${reportQuarter()} · categorie</div><h2>${c.icon} ${c.name}</h2></div><span class="cat-badge">${reportQuarter()}</span></div><div class="grid kpis"><div class="card tile"><small>Deelnemers</small><div class="val">${fmt(s.participants)}</div></div><div class="card tile"><small>Uitvoeringsmomenten</small><div class="val">${fmt(s.moments)}</div></div><div class="card tile"><small>Geregistreerd</small><div class="val">${fmt(s.registered)}</div></div><div class="card tile"><small>Doorstroom</small><div class="val">${fmt(s.flow)}</div></div></div><div class="split" style="margin-top:17px"><div class="card"><h3>KPI’s</h3>${categoryKpiOverview(cat)}</div><div class="card"><h3>Toelichting</h3><p>${escapeHtml(text)}</p><h3>Samenwerkingspartners</h3>${categoryPartnersHtml(cat)}<h3>Resultaatdiagram</h3>${reportMiniChart(cat,s)}</div></div>${cat==='verenigingsondersteuning'?reportSafety4v():''}<div class="card" style="margin-top:17px"><h3>Activiteiten ${reportQuarter()}</h3>${reportActivitiesTable(rows)}</div>${reportPhotos(cat)}${reportFooter(c.name)}</div>`}
function reportMiniChart(cat,s){let max=Math.max(s.moments,s.registered,s.participants,s.flow,1);return `<div class="grid">${[['Deelnemers',s.participants],['Momenten',s.moments],['Geregistreerd',s.registered],['Doorstroom',s.flow]].map(([l,v])=>`<div><div class="mini">${l}: ${fmt(v)}</div><div class="meter"><span style="width:${v/max*100}%"></span></div></div>`).join('')}</div>`}
function groupedReportActivities(rows){let groups=new Map();rows.forEach(r=>{let key=r.id||`${r.kpiId||''}_${r.title}`;if(!groups.has(key))groups.set(key,{...r,rows:[]});groups.get(key).rows.push(r)});return[...groups.values()]}
function groupedReportResult(group,metric){let regs=group.rows.map(r=>r.reg).filter(Boolean);if(!regs.length)return'-';if(metric==='participants')return fmt(regs.reduce((sum,r)=>sum+(+r.participants||0),0));if(metric==='activities')return`${fmt(regs.length)} uitgevoerd`;if(metric==='flow')return fmt(regs.reduce((sum,r)=>sum+(+r.flow||0),0));if(metric==='hours')return`${fmt(regs.reduce((sum,r)=>sum+(+r.hours||0),0))} uur`;if(metric==='partners'){let partners=[...new Set(regs.flatMap(r=>String(r.partners||'').split(/[;,\n]/)).map(p=>p.trim()).filter(Boolean))];return partners.join(', ')||'-'}return`${fmt(regs.length)} geregistreerd`}
function reportActivitiesTable(rows){if(!rows.length)return'<div class="empty">Geen activiteiten gekoppeld aan dit kwartaal.</div>';let groups=groupedReportActivities(rows);return `<table class="table"><thead><tr><th>KPI</th><th>Activiteit</th><th>Planning</th><th>Registraties</th><th>Meetmethode</th><th>Totaalresultaat</th></tr></thead><tbody>${groups.map(group=>{let k=state.kpis.find(k=>k.id===group.kpiId),registered=group.rows.filter(r=>r.registered).length;return `<tr><td>${escapeHtml(k?.name||'-')}</td><td>${escapeHtml(group.title)}</td><td>${group.type==='recurring'?'Herhaaldelijk':'Eenmalig'} (${fmt(group.rows.length)}×)</td><td>${fmt(registered)}/${fmt(group.rows.length)}</td><td>${escapeHtml(metricLabel(k?.metric)||'-')}</td><td>${escapeHtml(groupedReportResult(group,k?.metric))}</td></tr>`}).join('')}</tbody></table>`}

function compressPhoto(file,done){let reader=new FileReader();reader.onload=e=>{let img=new Image();img.onload=()=>{let scale=Math.min(1,1000/img.width),canvas=document.createElement('canvas');canvas.width=Math.round(img.width*scale);canvas.height=Math.round(img.height*scale);canvas.getContext('2d').drawImage(img,0,0,canvas.width,canvas.height);done(canvas.toDataURL('image/jpeg',.72))};img.src=e.target.result};reader.readAsDataURL(file)}

function readTabularFile(file,done){const reader=new FileReader();reader.onload=e=>{let rows=[];if(file.name.match(/\.xlsx?$/i)&&window.XLSX){let wb=XLSX.read(e.target.result,{type:'array'});rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{defval:''}).map(o=>Object.fromEntries(Object.entries(o).map(([k,v])=>[String(k).toLowerCase().trim(),String(v).trim()])))}else rows=parseCSV(e.target.result);done(rows)};if(file.name.match(/\.xlsx?$/i))reader.readAsArrayBuffer(file);else reader.readAsText(file)}

function checkNotifications(){if(!('Notification' in window)||Notification.permission!=='granted')return; const due=dueProjectAlerts()[0]; if(due && !sessionStorage.getItem('notified_'+due.type+due.date)){new Notification('BeweegImpact melding',{body:`${due.type} op ${due.date} (${due.diff} dagen)`}); sessionStorage.setItem('notified_'+due.type+due.date,'1')}}
function parseCSV(text){const rows=[]; let lines=text.split(/\r?\n/).filter(x=>x.trim()); if(!lines.length)return rows; const headers=lines[0].split(/[;,]/).map(h=>h.trim().toLowerCase()); for(let i=1;i<lines.length;i++){let vals=lines[i].split(/[;,]/); let obj={}; headers.forEach((h,j)=>obj[h]=vals[j]?.trim()||''); rows.push(obj)} return rows}
function rowToActivity(r,cat){let type=(r.type||r.soort||'single').toLowerCase().includes('her')||String(r.type||'').toLowerCase().includes('rec')?'recurring':'single'; let a={id:uid(),category:cat,title:r.titel||r.title||'Activiteit',type,time:r.tijd||r.time||'15:00',wijk:r.wijk||'',doelgroep:r.doelgroep||'',partner:r.partner||'',expected:+(r.verwacht||r.expected||r.deelnemers_verwacht||0)}; if(type==='recurring'){a.startDate=r.startdatum||r.startdate||r.datum||todayISO(); a.endDate=r.einddatum||r.enddate||a.startDate; let f=(r.frequentie||r.frequency||'weekly').toLowerCase(); a.frequency=f.includes('maand')||f.includes('month')?'monthly':f.includes('twee')||f.includes('bi')?'biweekly':'weekly'} else {a.date=r.datum||r.date||todayISO()} return a}
function importActivities(cat){let inp=document.getElementById('upload_'+cat), file=inp.files[0]; if(!file)return toast('Kies een bestand'); const reader=new FileReader(); reader.onload=e=>{let rows=[]; if(file.name.match(/\.xlsx?$/i) && window.XLSX){let wb=XLSX.read(e.target.result,{type:'array'}); rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{defval:''}).map(o=>Object.fromEntries(Object.entries(o).map(([k,v])=>[String(k).toLowerCase().trim(),String(v).trim()])))} else {rows=parseCSV(e.target.result)} state.activities.push(...rows.map(r=>rowToActivity(r,cat))); save(); toast(rows.length+' activiteiten geïmporteerd')}; if(file.name.match(/\.xlsx?$/i))reader.readAsArrayBuffer(file); else reader.readAsText(file)}
function metricFromText(value){let v=String(value||'').trim().toLowerCase(); if(v.includes('partner'))return'partners'; if(v.includes('doorstroom'))return'flow'; if(v.includes('activiteit'))return'activities'; if(v.includes('uren')||v.includes('uur'))return'hours'; return'participants'}
function categoryFromText(value){let v=String(value||'').trim().toLowerCase(); return (CATS.find(c=>c.id===v||c.name.toLowerCase()===v)||CATS[0]).id}
function rowToKpi(r){return{id:uid(),category:categoryFromText(r.categorie||r.category),name:r.kpi||r.naam||r.name||'KPI',target:+(r.doelwaarde||r.doel||r.target||0),metric:metricFromText(r.meetmethode||r.metric),toelichting:String(r.toelichting||'').trim().split(/\s+/).filter(Boolean).slice(0,50).join(' ')}}
function importKpis(){let inp=document.getElementById('kpiUpload'), file=inp.files[0]; if(!file)return toast('Kies een Excel- of CSV-bestand'); const reader=new FileReader(); reader.onload=e=>{let rows=[]; if(file.name.match(/\.xlsx?$/i)&&window.XLSX){let wb=XLSX.read(e.target.result,{type:'array'}); rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{defval:''}).map(o=>Object.fromEntries(Object.entries(o).map(([k,v])=>[String(k).toLowerCase().trim(),String(v).trim()])))}else{rows=parseCSV(e.target.result)} state.kpis.push(...rows.map(rowToKpi)); save(); toast(rows.length+' KPI’s geïmporteerd')}; if(file.name.match(/\.xlsx?$/i))reader.readAsArrayBuffer(file); else reader.readAsText(file)}
function rowToKpiActivity(r){let cat=categoryFromText(r.categorie||r.category), kpiName=String(r.kpi||'').trim().toLowerCase(), kpi=state.kpis.find(k=>k.category===cat&&k.name.trim().toLowerCase()===kpiName), a=rowToActivity(r,cat); a.quarter=String(r.kwartaal||r.quarter||'Q1').toUpperCase(); if(!['Q1','Q2','Q3','Q4'].includes(a.quarter))a.quarter='Q1'; if(kpi)a.kpiId=kpi.id; return a}
function importKpiActivities(){let inp=document.getElementById('kpiActivitiesUpload'), file=inp.files[0]; if(!file)return toast('Kies een Excel- of CSV-bestand'); const reader=new FileReader(); reader.onload=e=>{let rows=[]; if(file.name.match(/\.xlsx?$/i)&&window.XLSX){let wb=XLSX.read(e.target.result,{type:'array'}); rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{defval:''}).map(o=>Object.fromEntries(Object.entries(o).map(([k,v])=>[String(k).toLowerCase().trim(),String(v).trim()])))}else{rows=parseCSV(e.target.result)} let activities=rows.map(rowToKpiActivity), linked=activities.filter(a=>a.kpiId).length; state.activities.push(...activities); save(); toast(linked+' van '+rows.length+' activiteiten aan een KPI gekoppeld')}; if(file.name.match(/\.xlsx?$/i))reader.readAsArrayBuffer(file); else reader.readAsText(file)}
function parseAmount(value){let s=String(value??'').replace(/[€\s]/g,''); if(s.includes(',')&&s.includes('.'))s=s.replaceAll('.','').replace(',','.'); else if(s.includes(','))s=s.replace(',','.'); return +s||0}
function rowToExpense(r){return{id:uid(),date:r.datum||r.date||'',description:r.omschrijving||r.description||'',category:r.categorie||r.category||'',amount:parseAmount(r.bedrag||r.amount),vat:r.btw||r.vat||'',supplier:r.leverancier||r.supplier||''}}
function importExpenses(){let inp=document.getElementById('expensesUpload'), file=inp.files[0]; if(!file)return toast('Kies een Excel- of CSV-bestand'); const reader=new FileReader(); reader.onload=e=>{let rows=[]; if(file.name.match(/\.xlsx?$/i)&&window.XLSX){let wb=XLSX.read(e.target.result,{type:'array'}); rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{defval:''}).map(o=>Object.fromEntries(Object.entries(o).map(([k,v])=>[String(k).toLowerCase().trim(),String(v).trim()])))}else{rows=parseCSV(e.target.result)} state.expenses=state.expenses||[]; state.expenses.push(...rows.map(rowToExpense)); save(); toast(rows.length+' uitgaven geïmporteerd')}; if(file.name.match(/\.xlsx?$/i))reader.readAsArrayBuffer(file); else reader.readAsText(file)}
function csvDownload(name, rows){let blob=new Blob([rows.map(r=>r.map(v=>'"'+String(v??'').replaceAll('"','""')+'"').join(',')).join('\n')],{type:'text/csv'}); let a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=name; a.click()}
function downloadActivityTemplate(cat){csvDownload('template_'+catName(cat)+'.csv', [['titel','type','datum','startdatum','einddatum','frequentie','tijd','wijk','doelgroep','partner','verwacht'],['Naschoolse sportmix','herhaaldelijk','','2026-06-01','2026-12-01','wekelijks','15:00','Noord','Jeugd','Buurtsportcoach',20],['Sportinstuif','eenmalig','2026-07-10','','','','14:00','Centrum','Jongeren','Vereniging',40]])}
function downloadKpiTemplate(){csvDownload('template-kpis.csv',[['categorie','kpi','doelwaarde','meetmethode','toelichting'],['Jeugd','Aanwezige deelnemers bereiken',300,'aanwezige deelnemers','Toelichting van maximaal vijftig woorden.'],['Senioren','Samenwerkingspartners betrekken',8,'aantal samenwerkingspartners','Lokale partners die bijdragen aan de uitvoering.']])}
function downloadKpiActivityTemplate(){csvDownload('template-kpi-activiteiten.csv',[['categorie','kpi','kwartaal','titel','type','datum','startdatum','einddatum','frequentie','tijd','wijk','doelgroep','partner','verwacht'],['Jeugd','Aantal aanwezige deelnemers','Q1','Naschoolse sportmix','herhaaldelijk','','2026-01-15','2026-03-31','wekelijks','15:00','Noord','Jeugd','Buurtsportcoach',20],['Senioren','Aantal aanwezige deelnemers','Q2','Beweegmiddag','eenmalig','2026-05-20','','','','14:00','Centrum','Senioren','Welzijnsorganisatie',40]])}
function downloadExpensesTemplate(){csvDownload('template-financiele-uitgaven.csv',[['datum','omschrijving','categorie','bedrag','btw','leverancier'],['2026-02-15','Inhuur buurtsportcoach','Jeugd','2500,00','incl','Sportbedrijf'],['2026-03-01','Huur sporthal','Evenementen','750,00','excl','Sporthal Centrum']])}
function downloadHoursTemplate(){csvDownload('template-uren-per-categorie.csv',[['categorie','uren','omschrijving'],['Jeugd','120,5','Inzet buurtsportcoaches'],['Senioren','80','Begeleiding activiteiten']])}
function downloadSafety4vTemplate(){csvDownload('template-monitor-sociale-veiligheid-4v.csv',[['vereniging','vog','vertrouwenscontactpersoon','gedragscode','vakkundige_trainers'],['Sportclub Voorbeeld','ja','ja','ja','nee'],['Vereniging Demo','ja','nee','ja','ja']])}
function downloadCSV(type){if(type==='activities')csvDownload('activiteiten.csv',[['categorie','kpi','kwartaal','titel','type','datum/start','eind','frequentie','tijd','wijk','doelgroep','partner','verwacht'],...state.activities.map(a=>[catName(a.category),(state.kpis.find(k=>k.id===a.kpiId)||{}).name||'',a.quarter||'',a.title,a.type,a.date||a.startDate||'',a.endDate||'',a.frequency||'',a.time,a.wijk,a.doelgroep,a.partner,a.expected])]); if(type==='registrations')csvDownload('registraties.csv',[['categorie','activiteit','datum','deelnemers','doorstroom','uren','samenwerkingspartners'],...allOccurrences().filter(o=>o.reg).map(o=>[catName(o.category),o.title,o.occDate,o.reg.participants,o.reg.flow,o.reg.hours,o.reg.partners])]); if(type==='kpis')csvDownload('kpis.csv',[['categorie','kpi','meetmethode','toelichting','realisatie','doel','status'],...state.kpis.map(k=>{let v=metricValue(k), pct=k.target?v/k.target*100:0,s=statusFor(pct);return[catName(k.category),k.name,metricLabel(k.metric),k.toelichting||'',v,k.target,statusLabel(s)]})]); if(type==='expenses')csvDownload('financiele-uitgaven.csv',[['datum','omschrijving','categorie','bedrag','btw','leverancier'],...(state.expenses||[]).map(e=>[e.date,e.description,e.category,e.amount,e.vat,e.supplier])])}
function exportJson(){let blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'}); let a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='beweegimpact-backup.json'; a.click()}
function importJson(){let f=document.getElementById('jsonImport').files[0]; if(!f)return; let r=new FileReader(); r.onload=e=>{state=JSON.parse(e.target.result); save(); toast('JSON geïmporteerd')}; r.readAsText(f)}
function resetDemo(){if(confirm('Alle lokale data wissen?')){state=defaults(); save()}}
document.getElementById('modal').addEventListener('click',e=>{if(e.target.id==='modal')closeModal()});
render();
</script>
