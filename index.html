<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>BeweegImpact Monitor — categorie pilot</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
:root{--bg:#f4f7fb;--panel:#fff;--ink:#102033;--muted:#667085;--line:#e5eaf2;--brand:#147a73;--brand2:#41a36f;--blue:#2f80ed;--amber:#f59e0b;--red:#dc2626;--green:#16a34a;--shadow:0 12px 30px rgba(16,32,51,.08);--r:20px}*{box-sizing:border-box}body{margin:0;background:var(--bg);font-family:Inter,system-ui,-apple-system,Segoe UI,Arial,sans-serif;color:var(--ink)}.app{display:grid;grid-template-columns:285px 1fr;min-height:100vh}.sidebar{position:sticky;top:0;height:100vh;overflow:auto;background:#0e2d3e;color:white;padding:24px 18px}.logo{display:flex;gap:12px;align-items:center;margin-bottom:22px}.mark{width:46px;height:46px;border-radius:15px;background:linear-gradient(135deg,#3bbf8b,#3b82f6);display:grid;place-items:center;font-weight:900}.logo h1{font-size:18px;margin:0;line-height:1.1}.logo span{color:#b9cedd;font-size:12px}.nav{display:grid;gap:7px}.nav button{border:0;background:transparent;color:#c8d9e6;text-align:left;padding:11px 12px;border-radius:14px;font-weight:700;cursor:pointer}.nav button:hover,.nav button.active{background:rgba(255,255,255,.13);color:#fff}.side-card{margin-top:20px;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.07);border-radius:18px;padding:15px}.side-card p{font-size:12px;color:#c8d9e6;line-height:1.45;margin:8px 0 0}.main{padding:28px 32px 48px}.section{display:none}.section.active{display:block}.topbar{display:flex;justify-content:space-between;gap:16px;align-items:flex-start;margin-bottom:20px}.kicker{font-size:12px;font-weight:900;letter-spacing:.08em;text-transform:uppercase;color:var(--brand)}h2{font-size:31px;line-height:1.1;margin:5px 0 8px}p{color:var(--muted);line-height:1.55}.actions,.inline{display:flex;gap:9px;flex-wrap:wrap}.btn{border:1px solid var(--line);background:#fff;border-radius:13px;padding:10px 13px;font-weight:800;color:var(--ink);cursor:pointer}.btn.primary{background:var(--brand);border-color:var(--brand);color:white}.btn.small{padding:7px 9px;border-radius:10px;font-size:12px}.btn.danger{color:#b42323}.grid{display:grid;gap:17px}.kpis{grid-template-columns:repeat(4,minmax(140px,1fr))}.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);padding:20px}.card h3{margin:0 0 14px;font-size:18px}.tile small{color:var(--muted);font-weight:900}.tile .val{font-size:32px;font-weight:950;margin:7px 0 3px}.layout{display:grid;grid-template-columns:1.2fr .9fr;gap:17px;margin-top:17px}.split{display:grid;grid-template-columns:1fr 1fr;gap:17px}.thirds{display:grid;grid-template-columns:repeat(3,1fr);gap:17px}.formgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:13px}.field{display:grid;gap:7px}.field label{font-size:12px;font-weight:900;color:var(--muted);text-transform:uppercase}.field input,.field select,.field textarea{width:100%;border:1px solid var(--line);border-radius:13px;background:#fff;padding:11px;font:inherit}.field textarea{min-height:88px;resize:vertical}.full{grid-column:1/-1}.table{width:100%;border-collapse:collapse;font-size:14px}.table th,.table td{padding:11px 9px;border-bottom:1px solid var(--line);text-align:left;vertical-align:top}.table th{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}.pill{display:inline-flex;align-items:center;gap:6px;border-radius:999px;padding:5px 9px;font-size:12px;font-weight:900}.pill.green{background:#eaf8ee;color:#166534}.pill.orange{background:#fff7df;color:#92400e}.pill.red{background:#feecec;color:#991b1b}.pill.blue{background:#eef5ff;color:#1d4ed8}.pill.gray{background:#eef2f7;color:#475467}.dot{width:10px;height:10px;border-radius:50%;display:inline-block}.dot.green{background:var(--green)}.dot.orange{background:var(--amber)}.dot.red{background:var(--red)}.meter{height:10px;border-radius:999px;background:#edf2f7;overflow:hidden}.meter span{display:block;height:100%;background:var(--green);border-radius:999px}.meter.orange span{background:var(--amber)}.meter.red span{background:var(--red)}.notice{border:1px dashed #b8c7d8;border-radius:18px;background:#f8fbff;padding:14px;color:var(--muted);line-height:1.55}.alert{border:1px solid #f6d08a;background:#fff8e8;color:#794b00;border-radius:18px;padding:14px;margin:0 0 17px}.alert.red{border-color:#fecaca;background:#fff1f1;color:#991b1b}.empty{background:#f8fafc;border-radius:16px;padding:18px;text-align:center;color:var(--muted)}.cat-head{display:flex;justify-content:space-between;gap:13px;align-items:center;margin-bottom:17px}.cat-badge{font-size:13px;font-weight:900;color:var(--brand);background:#eaf8f1;border:1px solid #cdeee0;border-radius:999px;padding:8px 12px}.timeline{position:relative;padding-left:20px}.timeline:before{content:"";position:absolute;left:6px;top:6px;bottom:6px;width:3px;background:#dbe5ef;border-radius:999px}.tl{position:relative;margin:0 0 14px;padding:13px 14px;background:#fff;border:1px solid var(--line);border-radius:16px}.tl:before{content:"";position:absolute;left:-19px;top:19px;width:13px;height:13px;border-radius:50%;background:#94a3b8;border:3px solid #fff}.tl.done:before{background:var(--green)}.tl.now:before{background:var(--amber)}.tl.late:before{background:var(--red)}.tl strong{display:block}.tl small{color:var(--muted)}.wordcount{font-size:12px;color:var(--muted);text-align:right}.modal-backdrop{position:fixed;inset:0;background:rgba(15,23,42,.52);display:none;z-index:50;align-items:center;justify-content:center;padding:20px}.modal{background:#fff;border-radius:22px;box-shadow:0 24px 80px rgba(0,0,0,.25);width:min(680px,100%);max-height:92vh;overflow:auto;padding:22px}.modal h3{margin:0 0 8px}.toast{position:fixed;right:22px;bottom:22px;background:#0e2d3e;color:white;padding:13px 15px;border-radius:14px;display:none;z-index:60}.report-page{background:#fff;border:1px solid var(--line);border-radius:20px;padding:22px;margin:18px 0;page-break-after:always}.report-cover{background:linear-gradient(135deg,#0e2d3e,#147a73);color:white;border-radius:18px;padding:24px;margin-bottom:16px}.report-cover p{color:#dceff3}.mini{font-size:12px;color:var(--muted)}.canvasBox{height:280px}.print-only{display:none}@media(max-width:1050px){.app{grid-template-columns:1fr}.sidebar{height:auto;position:relative}.layout,.split,.thirds,.formgrid{grid-template-columns:1fr}.kpis{grid-template-columns:repeat(2,1fr)}}@media(max-width:650px){.main{padding:20px}.kpis{grid-template-columns:1fr}.topbar,.cat-head{display:block}.sidebar{padding:20px}}@media print{.sidebar,.actions,.btn,.no-print,.modal-backdrop{display:none!important}.app{display:block}.main{padding:0}.section{display:none!important}#rapportage{display:block!important}.card,.report-page{box-shadow:none}.print-only{display:block}}
</style>
</head>
<body>
<div class="app"><aside class="sidebar"><div class="logo"><div class="mark">BI</div><div><h1>BeweegImpact</h1><span>Gemeenteproject monitor</span></div></div><nav class="nav" id="nav"></nav><div class="side-card"><strong id="sideProject">Project</strong><p id="sideMeta">Vaste categorieën, KPI-stoplichten, activiteiten en verantwoordingsplanning.</p></div></aside><main class="main" id="main"></main></div>
<div class="modal-backdrop" id="modal"><div class="modal" id="modalContent"></div></div><div class="toast" id="toast"></div>
<script>
const CATS=[{id:'jeugd',name:'Jeugd',icon:'🧒'},{id:'jongeren',name:'Jongeren',icon:'🏀'},{id:'volwassenen',name:'Volwassenen',icon:'🚶'},{id:'senioren',name:'Senioren',icon:'🌿'},{id:'jogg',name:'JOGG',icon:'🍎'},{id:'verenigingsondersteuning',name:'Verenigingsondersteuning',icon:'🤝'},{id:'evenementen',name:'Evenementen',icon:'🎪'}];
const STORE='beweegimpact_categorie_v4';
let state=load(); let chartA=null; let chartB=null;
function defaults(){return{project:{naam:'Gemeenteproject Sport & Bewegen',gemeente:'Gemeente Demo',projectleider:'',financiering:'SPUK / Lokaal sportakkoord',looptijdStart:'2026-01-01',looptijdEind:'2026-12-31',kwartaalDatums:'2026-04-15, 2026-07-15, 2026-10-15, 2027-01-15',deadlineVerantwoording:'2027-02-01',typeVerantwoording:'financieel_rapportage',meldingDagen:14},kpis:seedKpis(),activities:[],registrations:{},reports:{}}}
function seedKpis(){return CATS.map(c=>({id:uid(),category:c.id,name:c.name==='Verenigingsondersteuning'?'Aantal ondersteunde verenigingen':'Aantal bereikte deelnemers',target:c.id==='evenementen'?500:c.id==='jogg'?750:300,metric:c.id==='verenigingsondersteuning'?'uniqueActivities':'participants'}));}
function load(){try{return JSON.parse(localStorage.getItem(STORE))||defaults()}catch(e){return defaults()}}
function save(){localStorage.setItem(STORE,JSON.stringify(state)); render();}
function uid(){return Math.random().toString(36).slice(2,9)+Date.now().toString(36).slice(-4)}
function fmt(n){return new Intl.NumberFormat('nl-NL').format(Math.round(Number(n)||0))}
function todayISO(){return new Date().toISOString().slice(0,10)}
function dt(activity, occDate){return new Date((occDate||activity.date||todayISO())+'T'+(activity.time||'23:59'))}
function catName(id){return (CATS.find(c=>c.id===id)||{}).name||id}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.style.display='block';setTimeout(()=>t.style.display='none',2600)}
function escapeHtml(s){return String(s??'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]))}
function statusFor(pct){if(pct>=80)return'green'; if(pct>=50)return'orange'; return'red'}
function statusLabel(s){return s==='green'?'Groen / op koers':s==='orange'?'Oranje / aandacht':'Rood / achterstand'}
function calcOccurrences(a){ if(a.type!=='recurring') return [{id:a.id+'_'+a.date,date:a.date}]; let res=[], cur=new Date(a.startDate+'T00:00'), end=new Date(a.endDate+'T00:00'); let step=a.frequency==='biweekly'?14:a.frequency==='monthly'?31:7; let count=0; while(cur<=end && count<200){let iso=cur.toISOString().slice(0,10); res.push({id:a.id+'_'+iso,date:iso}); if(a.frequency==='monthly'){cur.setMonth(cur.getMonth()+1)}else{cur.setDate(cur.getDate()+step)} count++;} return res;}
function allOccurrences(){let rows=[]; state.activities.forEach(a=>calcOccurrences(a).forEach(o=>rows.push({...a,occurrenceId:o.id,occDate:o.date,registered:!!state.registrations[o.id],reg:state.registrations[o.id]}))); return rows.sort((a,b)=>dt(a,a.occDate)-dt(b,b.occDate));}
function dueOccurrences(){const now=new Date(); return allOccurrences().filter(o=>dt(o,o.occDate)<now && !o.registered);}
function categoryRows(cat){return allOccurrences().filter(o=>o.category===cat)}
function sumFor(cat){const rows=categoryRows(cat), regs=rows.map(r=>r.reg).filter(Boolean); return {activities:rows.length,registered:regs.length,participants:regs.reduce((s,r)=>s+(+r.participants||0),0),unique:regs.reduce((s,r)=>s+(+r.unique||0),0),flow:regs.reduce((s,r)=>s+(+r.flow||0),0),hours:regs.reduce((s,r)=>s+(+r.hours||0),0)}}
function metricValue(kpi){const s=sumFor(kpi.category); if(kpi.metric==='participants')return s.participants; if(kpi.metric==='unique')return s.unique; if(kpi.metric==='activities')return s.registered; if(kpi.metric==='plannedActivities')return s.activities; if(kpi.metric==='flow')return s.flow; if(kpi.metric==='hours')return s.hours; if(kpi.metric==='uniqueActivities')return new Set(state.activities.filter(a=>a.category===kpi.category).map(a=>a.title)).size; return 0;}
function projectEvents(){const p=state.project, ev=[]; if(p.looptijdStart)ev.push({type:'Start project',date:p.looptijdStart}); (p.kwartaalDatums||'').split(/[;,\n]/).map(x=>x.trim()).filter(Boolean).forEach((d,i)=>ev.push({type:'Kwartaalrapportage '+(i+1),date:d})); if(p.deadlineVerantwoording)ev.push({type:'Deadline eindverantwoording',date:p.deadlineVerantwoording}); if(p.looptijdEind)ev.push({type:'Einde projectperiode',date:p.looptijdEind}); return ev.filter(e=>!isNaN(new Date(e.date))).sort((a,b)=>new Date(a.date)-new Date(b.date));}
function dueProjectAlerts(){const days=+(state.project.meldingDagen||14), now=new Date(); return projectEvents().map(e=>{const diff=Math.ceil((new Date(e.date)-now)/(1000*60*60*24)); return {...e,diff}}).filter(e=>e.diff>=0&&e.diff<=days);}
function navButton(id,label,active){return `<button class="${active?'active':''}" data-tab="${id}">${label}</button>`}
function renderNav(tab='dashboard'){document.getElementById('nav').innerHTML=[navButton('dashboard','Dashboard',tab==='dashboard'),navButton('project','Project',tab==='project'),navButton('kpis','KPI’s & stoplichten',tab==='kpis'),...CATS.map(c=>navButton('cat-'+c.id,c.icon+' '+c.name,tab==='cat-'+c.id)),navButton('rapportage','Rapportage',tab==='rapportage'),navButton('data','Data & export',tab==='data')].join(''); document.querySelectorAll('.nav button').forEach(b=>b.onclick=()=>show(b.dataset.tab));}
function show(tab){renderNav(tab); renderMain(tab); window.scrollTo(0,0)}
function render(){const active=document.querySelector('.nav button.active')?.dataset.tab||'dashboard'; document.getElementById('sideProject').textContent=state.project.naam||'Project'; document.getElementById('sideMeta').textContent=(state.project.gemeente||'')+' · '+(state.project.looptijdStart||'?')+' t/m '+(state.project.looptijdEind||'?'); renderNav(active); renderMain(active)}
function alertsHtml(){const due=dueOccurrences(), pa=dueProjectAlerts(); let html=''; if(due.length) html+=`<div class="alert red"><strong>${due.length} activiteit(en) hebben registratie nodig.</strong> <button class="btn small" onclick="openRegistration('${due[0].occurrenceId}')">Open eerste registratie</button></div>`; if(pa.length) html+=`<div class="alert"><strong>Planning:</strong> ${pa.map(a=>`${a.type} op ${a.date} (${a.diff} dagen)`).join(' · ')}</div>`; return html;}
function renderMain(tab){const main=document.getElementById('main'); if(tab==='dashboard') main.innerHTML=dashboardHtml(); else if(tab==='project') main.innerHTML=projectHtml(); else if(tab==='kpis') main.innerHTML=kpiHtml(); else if(tab.startsWith('cat-')) main.innerHTML=categoryHtml(tab.replace('cat-','')); else if(tab==='rapportage') main.innerHTML=rapportageHtml(); else if(tab==='data') main.innerHTML=dataHtml(); setTimeout(afterRender,0)}
function dashboardHtml(){const totals=CATS.map(c=>({c,s:sumFor(c.id)})); const participants=totals.reduce((s,x)=>s+x.s.participants,0), unique=totals.reduce((s,x)=>s+x.s.unique,0), registered=totals.reduce((s,x)=>s+x.s.registered,0), due=dueOccurrences().length; return `<section class="section active">${alertsHtml()}<div class="topbar"><div><div class="kicker">Overzicht</div><h2>Impactdashboard</h2><p>Standaardcategorieën met eigen activiteitenpagina’s, KPI-stoplichten, registraties na afloop en projectplanning.</p></div><div class="actions"><button class="btn" onclick="exportJson()">Back-up JSON</button><button class="btn primary" onclick="window.print()">Print / PDF</button></div></div><div class="grid kpis"><div class="card tile"><small>Deelnemers</small><div class="val">${fmt(participants)}</div><span class="pill green">geregistreerd</span></div><div class="card tile"><small>Unieke deelnemers</small><div class="val">${fmt(unique)}</div><span class="pill blue">bereik</span></div><div class="card tile"><small>Activiteiten geregistreerd</small><div class="val">${fmt(registered)}</div><span class="pill gray">uitgevoerd</span></div><div class="card tile"><small>Registraties nodig</small><div class="val">${fmt(due)}</div><span class="pill ${due?'red':'green'}">${due?'actie nodig':'bijgewerkt'}</span></div></div><div class="layout"><div class="card"><h3>Deelnemers per categorie</h3><div class="canvasBox"><canvas id="chartCats"></canvas></div></div><div class="card"><h3>KPI-stoplichten</h3>${kpiStoplightsHtml()}</div></div><div class="card" style="margin-top:17px"><h3>Proces-tijdbalk</h3>${timelineHtml()}</div></section>`}
function kpiStoplightsHtml(category){let list=state.kpis.filter(k=>!category||k.category===category); if(!list.length)return'<div class="empty">Nog geen KPI’s.</div>'; return list.map(k=>{let v=metricValue(k), pct=k.target?Math.min(100,v/k.target*100):0, s=statusFor(pct); return `<div style="margin-bottom:14px"><div style="display:flex;justify-content:space-between;gap:10px"><strong>${escapeHtml(k.name)}</strong><span class="pill ${s}"><span class="dot ${s}"></span>${Math.round(pct)}%</span></div><div class="mini">${catName(k.category)} · ${fmt(v)} van ${fmt(k.target)} · ${statusLabel(s)}</div><div class="meter ${s==='orange'?'orange':s==='red'?'red':''}"><span style="width:${Math.min(100,pct)}%"></span></div></div>`}).join('')}
function timelineHtml(){const ev=projectEvents(), now=new Date(); if(!ev.length)return'<div class="empty">Vul projectdatums in om de tijdbalk te tonen.</div>'; return `<div class="timeline">${ev.map(e=>{let d=new Date(e.date), cls=d<now?'done':(Math.ceil((d-now)/(86400000))<=+(state.project.meldingDagen||14)?'now':''); return `<div class="tl ${cls}"><strong>${escapeHtml(e.type)}</strong><small>${e.date}${cls==='now'?' · binnenkort actie nodig':''}</small></div>`}).join('')}</div>`}
function projectHtml(){const p=state.project; return `<section class="section active">${alertsHtml()}<div class="topbar"><div><div class="kicker">Project</div><h2>Projectinstellingen & verantwoordingsplanning</h2><p>Leg looptijd, rapportagemomenten, deadline en verantwoordingsvorm vast. De tijdbalk toont waar je staat en welke meldingen eraan komen.</p></div><div class="actions"><button class="btn" onclick="requestNotifications()">Meldingen toestaan</button><button class="btn primary" onclick="saveProject()">Opslaan</button></div></div><div class="split"><div class="card"><h3>Projectparameters</h3><div class="formgrid"><div class="field"><label>Naam gemeenteproject</label><input id="p_naam" value="${escapeHtml(p.naam)}"></div><div class="field"><label>Gemeente</label><input id="p_gemeente" value="${escapeHtml(p.gemeente)}"></div><div class="field"><label>Projectleider</label><input id="p_projectleider" value="${escapeHtml(p.projectleider)}"></div><div class="field"><label>Financiering</label><input id="p_financiering" value="${escapeHtml(p.financiering)}"></div><div class="field"><label>Looptijd start</label><input type="date" id="p_looptijdStart" value="${p.looptijdStart||''}"></div><div class="field"><label>Looptijd einde</label><input type="date" id="p_looptijdEind" value="${p.looptijdEind||''}"></div><div class="field full"><label>Afspraken datum kwartaalrapportages</label><textarea id="p_kwartaalDatums" placeholder="Bijv. 2026-04-15, 2026-07-15, 2026-10-15">${escapeHtml(p.kwartaalDatums)}</textarea><span class="mini">Gebruik komma’s of nieuwe regels voor meerdere rapportagedata.</span></div><div class="field"><label>Deadline verantwoording</label><input type="date" id="p_deadlineVerantwoording" value="${p.deadlineVerantwoording||''}"></div><div class="field"><label>Verantwoording</label><select id="p_typeVerantwoording"><option value="financieel_rapportage" ${p.typeVerantwoording==='financieel_rapportage'?'selected':''}>Financieel + rapportage</option><option value="rapportage" ${p.typeVerantwoording==='rapportage'?'selected':''}>Alleen rapportage</option></select></div><div class="field"><label>Melding aantal dagen vooraf</label><input type="number" min="1" id="p_meldingDagen" value="${p.meldingDagen||14}"></div></div></div><div class="card"><h3>Proces-tijdbalk</h3>${timelineHtml()}<div class="notice" style="margin-top:14px">Meldingen verschijnen in de app zodra een kwartaalrapportage of eindverantwoording binnen de ingestelde termijn valt. Browsernotificaties werken alleen als deze pagina geopend is.</div></div></div></section>`}
function kpiHtml(){return `<section class="section active">${alertsHtml()}<div class="topbar"><div><div class="kicker">KPI’s</div><h2>KPI’s & stoplichtmethode</h2><p>KPI’s zijn gekoppeld aan één van de vaste categorieën. De status wordt automatisch groen, oranje of rood op basis van realisatie versus doelwaarde.</p></div></div><div class="split"><div class="card"><h3>Nieuwe KPI</h3><div class="formgrid"><div class="field"><label>Categorie</label><select id="k_category">${CATS.map(c=>`<option value="${c.id}">${c.name}</option>`).join('')}</select></div><div class="field"><label>KPI-naam</label><input id="k_name" placeholder="Bijv. 200 jongeren bereikt"></div><div class="field"><label>Doelwaarde</label><input id="k_target" type="number" min="0" value="100"></div><div class="field"><label>Meetmethode</label><select id="k_metric"><option value="participants">Som aanwezige deelnemers</option><option value="unique">Som unieke deelnemers</option><option value="activities">Aantal geregistreerde activiteiten</option><option value="plannedActivities">Aantal geplande activiteiten incl. herhaling</option><option value="flow">Som doorstroom</option><option value="hours">Uren inzet</option><option value="uniqueActivities">Unieke activiteitstitels</option></select></div><div class="full"><button class="btn primary" onclick="addKpi()">KPI toevoegen</button></div></div></div><div class="card"><h3>Stoplichtoverzicht</h3>${kpiStoplightsHtml()}</div></div><div class="card" style="margin-top:17px"><h3>Alle KPI’s</h3>${kpiTable()}</div></section>`}
function kpiTable(){if(!state.kpis.length)return'<div class="empty">Geen KPI’s.</div>'; return `<table class="table"><thead><tr><th>Categorie</th><th>KPI</th><th>Meetmethode</th><th>Realisatie</th><th>Doel</th><th>Status</th><th></th></tr></thead><tbody>${state.kpis.map(k=>{let v=metricValue(k), pct=k.target?Math.min(100,v/k.target*100):0, s=statusFor(pct); return `<tr><td>${catName(k.category)}</td><td>${escapeHtml(k.name)}</td><td>${k.metric}</td><td>${fmt(v)}</td><td>${fmt(k.target)}</td><td><span class="pill ${s}"><span class="dot ${s}"></span>${Math.round(pct)}%</span></td><td><button class="btn small danger" onclick="deleteKpi('${k.id}')">Verwijder</button></td></tr>`}).join('')}</tbody></table>`}
function categoryHtml(cat){const c=CATS.find(x=>x.id===cat), s=sumFor(cat), due=dueOccurrences().filter(o=>o.category===cat); let text=state.reports[cat]||''; return `<section class="section active">${due.length?`<div class="alert red"><strong>${due.length} registratie(s) nodig voor ${c.name}.</strong> <button class="btn small" onclick="openRegistration('${due[0].occurrenceId}')">Registreren</button></div>`:''}<div class="cat-head"><div><div class="kicker">Categorie</div><h2>${c.icon} ${c.name}</h2><p>Eigen activiteitenpagina voor eenmalige en herhaalde activiteiten, Excel/CSV-upload, registratie na afloop en rapportagetekst.</p></div><span class="cat-badge">${c.name}</span></div><div class="grid kpis"><div class="card tile"><small>Deelnemers</small><div class="val">${fmt(s.participants)}</div></div><div class="card tile"><small>Unieke deelnemers</small><div class="val">${fmt(s.unique)}</div></div><div class="card tile"><small>Geregistreerde momenten</small><div class="val">${fmt(s.registered)}</div></div><div class="card tile"><small>Geplande momenten</small><div class="val">${fmt(s.activities)}</div></div></div><div class="layout"><div class="card"><h3>Activiteit invoeren</h3>${activityForm(cat)}</div><div class="card"><h3>KPI-status ${c.name}</h3>${kpiStoplightsHtml(cat)}</div></div><div class="split" style="margin-top:17px"><div class="card"><h3>Upload activiteiten vanuit Excel</h3><p class="mini">Upload een .xlsx-bestand of CSV. Kolommen: titel, type, datum, startdatum, einddatum, frequentie, tijd, wijk, doelgroep, partner, verwacht.</p><div class="inline"><input type="file" id="upload_${cat}" accept=".xlsx,.xls,.csv"><button class="btn" onclick="importActivities('${cat}')">Uploaden</button><button class="btn" onclick="downloadActivityTemplate('${cat}')">Template CSV</button></div></div><div class="card"><h3>Rapportagetekst</h3><textarea id="report_${cat}" maxlength="800" oninput="limitWords('${cat}')" placeholder="Beschrijf de activiteiten en resultaten in maximaal 100 woorden.">${escapeHtml(text)}</textarea><div class="wordcount" id="wc_${cat}">${wordCount(text)}/100 woorden</div><button class="btn primary" onclick="saveReportText('${cat}')">Tekst opslaan</button></div></div><div class="card" style="margin-top:17px"><h3>Activiteitenplanning</h3>${activitiesTable(cat)}</div><div class="card" style="margin-top:17px"><h3>Registraties</h3>${registrationsTable(cat)}</div></section>`}
function activityForm(cat){return `<div class="formgrid"><div class="field full"><label>Titel activiteit</label><input id="a_title_${cat}" placeholder="Bijv. Naschoolse sportmix"></div><div class="field"><label>Type</label><select id="a_type_${cat}" onchange="toggleActivityDates('${cat}')"><option value="single">Eenmalig</option><option value="recurring">Herhaaldelijk</option></select></div><div class="field"><label>Tijd</label><input type="time" id="a_time_${cat}" value="15:00"></div><div class="field single_${cat}"><label>Datum</label><input type="date" id="a_date_${cat}" value="${todayISO()}"></div><div class="field recur_${cat}" style="display:none"><label>Startdatum</label><input type="date" id="a_start_${cat}" value="${todayISO()}"></div><div class="field recur_${cat}" style="display:none"><label>Einddatum</label><input type="date" id="a_end_${cat}" value="${todayISO()}"></div><div class="field recur_${cat}" style="display:none"><label>Frequentie</label><select id="a_freq_${cat}"><option value="weekly">Wekelijks</option><option value="biweekly">Tweewekelijks</option><option value="monthly">Maandelijks</option></select></div><div class="field"><label>Wijk / kern</label><input id="a_wijk_${cat}" placeholder="Bijv. Noord"></div><div class="field"><label>Doelgroep</label><input id="a_doelgroep_${cat}" placeholder="Bijv. groep 5-8"></div><div class="field"><label>Partner / uitvoerder</label><input id="a_partner_${cat}" placeholder="Bijv. buurtsportcoach / vereniging"></div><div class="field"><label>Verwachte deelnemers</label><input type="number" id="a_expected_${cat}" value="20"></div><div class="full"><button class="btn primary" onclick="addActivity('${cat}')">Activiteit toevoegen</button></div></div>`}
function activitiesTable(cat){let list=state.activities.filter(a=>a.category===cat); if(!list.length)return'<div class="empty">Nog geen activiteiten ingevoerd.</div>'; return `<table class="table"><thead><tr><th>Titel</th><th>Type</th><th>Planning</th><th>Wijk</th><th>Verwacht</th><th>Momenten</th><th></th></tr></thead><tbody>${list.map(a=>`<tr><td>${escapeHtml(a.title)}</td><td>${a.type==='recurring'?'Herhaaldelijk':'Eenmalig'}</td><td>${a.type==='recurring'?`${a.startDate} t/m ${a.endDate} · ${a.frequency}`:a.date} ${a.time||''}</td><td>${escapeHtml(a.wijk)}</td><td>${fmt(a.expected)}</td><td>${calcOccurrences(a).length}</td><td><button class="btn small danger" onclick="deleteActivity('${a.id}')">Verwijder</button></td></tr>`).join('')}</tbody></table>`}
function registrationsTable(cat){let rows=categoryRows(cat).filter(r=>r.reg); if(!rows.length)return'<div class="empty">Nog geen deelnemersregistraties.</div>'; return `<table class="table"><thead><tr><th>Datum</th><th>Activiteit</th><th>Deelnemers</th><th>Uniek</th><th>Doorstroom</th><th>Bijzonderheden</th></tr></thead><tbody>${rows.map(r=>`<tr><td>${r.occDate}</td><td>${escapeHtml(r.title)}</td><td>${fmt(r.reg.participants)}</td><td>${fmt(r.reg.unique)}</td><td>${fmt(r.reg.flow)}</td><td>${escapeHtml(r.reg.note||'')}</td></tr>`).join('')}</tbody></table>`}
function rapportageHtml(){return `<section class="section active"><div class="topbar"><div><div class="kicker">Rapportage</div><h2>Rapportage per categorie</h2><p>Genereert één pagina per vaste categorie met KPI-stoplichten, kerncijfers, activiteiten en de toelichting van maximaal 100 woorden.</p></div><div class="actions"><button class="btn primary" onclick="window.print()">Print / PDF</button></div></div><div class="report-cover"><h2>${escapeHtml(state.project.naam)}</h2><p>${escapeHtml(state.project.gemeente)} · ${state.project.looptijdStart||'?'} t/m ${state.project.looptijdEind||'?'} · ${state.project.typeVerantwoording==='financieel_rapportage'?'Financieel + rapportage':'Alleen rapportage'}</p></div>${CATS.map(c=>reportPage(c.id)).join('')}</section>`}
function reportPage(cat){const c=CATS.find(x=>x.id===cat), s=sumFor(cat), text=state.reports[cat]||'Nog geen toelichting ingevuld.'; return `<div class="report-page"><h2>${c.icon} ${c.name}</h2><div class="grid kpis"><div class="card tile"><small>Deelnemers</small><div class="val">${fmt(s.participants)}</div></div><div class="card tile"><small>Uniek</small><div class="val">${fmt(s.unique)}</div></div><div class="card tile"><small>Activiteiten</small><div class="val">${fmt(s.registered)}</div></div><div class="card tile"><small>Doorstroom</small><div class="val">${fmt(s.flow)}</div></div></div><h3>KPI-status</h3>${kpiStoplightsHtml(cat)}<h3>Toelichting activiteiten</h3><p>${escapeHtml(text)}</p><h3>Uitgevoerde registraties</h3>${registrationsTable(cat)}</div>`}
function dataHtml(){return `<section class="section active"><div class="topbar"><div><div class="kicker">Data</div><h2>Data & export</h2><p>Back-up, import en exports voor controle of verdere verwerking.</p></div></div><div class="split"><div class="card"><h3>Back-up</h3><div class="inline"><button class="btn primary" onclick="exportJson()">Download JSON</button><input type="file" id="jsonImport" accept=".json"><button class="btn" onclick="importJson()">Import JSON</button></div></div><div class="card"><h3>Exports</h3><div class="inline"><button class="btn" onclick="downloadCSV('activities')">Activiteiten CSV</button><button class="btn" onclick="downloadCSV('registrations')">Registraties CSV</button><button class="btn" onclick="downloadCSV('kpis')">KPI CSV</button></div></div></div><div class="card" style="margin-top:17px"><h3>Let op</h3><p>Deze pilot slaat data lokaal in de browser op. Voor productie is een centrale database met gebruikersrechten nodig.</p><button class="btn danger" onclick="resetDemo()">Reset alle lokale data</button></div></section>`}
function afterRender(){const ctx=document.getElementById('chartCats'); if(ctx && window.Chart){if(chartA)chartA.destroy(); chartA=new Chart(ctx,{type:'bar',data:{labels:CATS.map(c=>c.name),datasets:[{label:'Deelnemers',data:CATS.map(c=>sumFor(c.id).participants)}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true}}}})} checkNotifications();}
function saveProject(){['naam','gemeente','projectleider','financiering','looptijdStart','looptijdEind','kwartaalDatums','deadlineVerantwoording','typeVerantwoording','meldingDagen'].forEach(k=>{let el=document.getElementById('p_'+k); if(el)state.project[k]=el.value}); save(); toast('Project opgeslagen')}
function addKpi(){let name=document.getElementById('k_name').value.trim(); if(!name)return toast('Vul een KPI-naam in'); state.kpis.push({id:uid(),category:document.getElementById('k_category').value,name,target:+document.getElementById('k_target').value||0,metric:document.getElementById('k_metric').value}); save(); toast('KPI toegevoegd')}
function deleteKpi(id){state.kpis=state.kpis.filter(k=>k.id!==id); save()}
function toggleActivityDates(cat){let recurring=document.getElementById('a_type_'+cat).value==='recurring'; document.querySelectorAll('.recur_'+cat).forEach(e=>e.style.display=recurring?'grid':'none'); document.querySelectorAll('.single_'+cat).forEach(e=>e.style.display=recurring?'none':'grid')}
function addActivity(cat){let title=document.getElementById('a_title_'+cat).value.trim(); if(!title)return toast('Vul een titel in'); let type=document.getElementById('a_type_'+cat).value; let a={id:uid(),category:cat,title,type,time:document.getElementById('a_time_'+cat).value,wijk:document.getElementById('a_wijk_'+cat).value,doelgroep:document.getElementById('a_doelgroep_'+cat).value,partner:document.getElementById('a_partner_'+cat).value,expected:+document.getElementById('a_expected_'+cat).value||0}; if(type==='recurring'){a.startDate=document.getElementById('a_start_'+cat).value; a.endDate=document.getElementById('a_end_'+cat).value; a.frequency=document.getElementById('a_freq_'+cat).value}else{a.date=document.getElementById('a_date_'+cat).value} state.activities.push(a); save(); toast('Activiteit toegevoegd')}
function deleteActivity(id){state.activities=state.activities.filter(a=>a.id!==id); Object.keys(state.registrations).forEach(k=>{if(k.startsWith(id+'_'))delete state.registrations[k]}); save()}
function openRegistration(occId){const occ=allOccurrences().find(o=>o.occurrenceId===occId); if(!occ)return; document.getElementById('modalContent').innerHTML=`<h3>Deelnemers registreren</h3><p><strong>${escapeHtml(occ.title)}</strong><br>${catName(occ.category)} · ${occ.occDate} ${occ.time||''}</p><div class="formgrid"><div class="field"><label>Aanwezige deelnemers</label><input type="number" id="r_participants" value="${occ.reg?.participants||occ.expected||0}"></div><div class="field"><label>Unieke deelnemers</label><input type="number" id="r_unique" value="${occ.reg?.unique||0}"></div><div class="field"><label>Doorstroom naar structureel aanbod</label><input type="number" id="r_flow" value="${occ.reg?.flow||0}"></div><div class="field"><label>Uren inzet</label><input type="number" step="0.25" id="r_hours" value="${occ.reg?.hours||1}"></div><div class="field full"><label>Bijzonderheden / opbrengst</label><textarea id="r_note">${escapeHtml(occ.reg?.note||'')}</textarea></div></div><div class="actions" style="margin-top:14px"><button class="btn" onclick="closeModal()">Annuleren</button><button class="btn primary" onclick="saveRegistration('${occId}')">Opslaan</button></div>`; document.getElementById('modal').style.display='flex'}
function closeModal(){document.getElementById('modal').style.display='none'}
function saveRegistration(id){state.registrations[id]={participants:+document.getElementById('r_participants').value||0,unique:+document.getElementById('r_unique').value||0,flow:+document.getElementById('r_flow').value||0,hours:+document.getElementById('r_hours').value||0,note:document.getElementById('r_note').value,registeredAt:new Date().toISOString()}; closeModal(); save(); toast('Registratie opgeslagen')}
function wordCount(t){return String(t||'').trim().split(/\s+/).filter(Boolean).length}
function limitWords(cat){let el=document.getElementById('report_'+cat), words=el.value.trim().split(/\s+/).filter(Boolean); if(words.length>100){el.value=words.slice(0,100).join(' '); words=words.slice(0,100)} document.getElementById('wc_'+cat).textContent=words.length+'/100 woorden'}
function saveReportText(cat){let el=document.getElementById('report_'+cat), words=el.value.trim().split(/\s+/).filter(Boolean); state.reports[cat]=words.slice(0,100).join(' '); save(); toast('Rapportagetekst opgeslagen')}
function requestNotifications(){ if(!('Notification' in window))return toast('Browser ondersteunt geen notificaties'); Notification.requestPermission().then(p=>toast(p==='granted'?'Meldingen toegestaan':'Meldingen niet toegestaan'))}
function checkNotifications(){if(!('Notification' in window)||Notification.permission!=='granted')return; const due=dueProjectAlerts()[0]; if(due && !sessionStorage.getItem('notified_'+due.type+due.date)){new Notification('BeweegImpact melding',{body:`${due.type} op ${due.date} (${due.diff} dagen)`}); sessionStorage.setItem('notified_'+due.type+due.date,'1')}}
function parseCSV(text){const rows=[]; let lines=text.split(/\r?\n/).filter(x=>x.trim()); if(!lines.length)return rows; const headers=lines[0].split(/[;,]/).map(h=>h.trim().toLowerCase()); for(let i=1;i<lines.length;i++){let vals=lines[i].split(/[;,]/); let obj={}; headers.forEach((h,j)=>obj[h]=vals[j]?.trim()||''); rows.push(obj)} return rows}
function rowToActivity(r,cat){let type=(r.type||r.soort||'single').toLowerCase().includes('her')||String(r.type||'').toLowerCase().includes('rec')?'recurring':'single'; let a={id:uid(),category:cat,title:r.titel||r.title||'Activiteit',type,time:r.tijd||r.time||'15:00',wijk:r.wijk||'',doelgroep:r.doelgroep||'',partner:r.partner||'',expected:+(r.verwacht||r.expected||r.deelnemers_verwacht||0)}; if(type==='recurring'){a.startDate=r.startdatum||r.startdate||r.datum||todayISO(); a.endDate=r.einddatum||r.enddate||a.startDate; let f=(r.frequentie||r.frequency||'weekly').toLowerCase(); a.frequency=f.includes('maand')||f.includes('month')?'monthly':f.includes('twee')||f.includes('bi')?'biweekly':'weekly'} else {a.date=r.datum||r.date||todayISO()} return a}
function importActivities(cat){let inp=document.getElementById('upload_'+cat), file=inp.files[0]; if(!file)return toast('Kies een bestand'); const reader=new FileReader(); reader.onload=e=>{let rows=[]; if(file.name.match(/\.xlsx?$/i) && window.XLSX){let wb=XLSX.read(e.target.result,{type:'array'}); rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{defval:''}).map(o=>Object.fromEntries(Object.entries(o).map(([k,v])=>[String(k).toLowerCase().trim(),String(v).trim()])))} else {rows=parseCSV(e.target.result)} state.activities.push(...rows.map(r=>rowToActivity(r,cat))); save(); toast(rows.length+' activiteiten geïmporteerd')}; if(file.name.match(/\.xlsx?$/i))reader.readAsArrayBuffer(file); else reader.readAsText(file)}
function csvDownload(name, rows){let blob=new Blob([rows.map(r=>r.map(v=>'"'+String(v??'').replaceAll('"','""')+'"').join(',')).join('\n')],{type:'text/csv'}); let a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=name; a.click()}
function downloadActivityTemplate(cat){csvDownload('template_'+catName(cat)+'.csv', [['titel','type','datum','startdatum','einddatum','frequentie','tijd','wijk','doelgroep','partner','verwacht'],['Naschoolse sportmix','herhaaldelijk','','2026-06-01','2026-12-01','wekelijks','15:00','Noord','Jeugd','Buurtsportcoach',20],['Sportinstuif','eenmalig','2026-07-10','','','','14:00','Centrum','Jongeren','Vereniging',40]])}
function downloadCSV(type){if(type==='activities')csvDownload('activiteiten.csv',[['categorie','titel','type','datum/start','eind','frequentie','tijd','wijk','doelgroep','partner','verwacht'],...state.activities.map(a=>[catName(a.category),a.title,a.type,a.date||a.startDate||'',a.endDate||'',a.frequency||'',a.time,a.wijk,a.doelgroep,a.partner,a.expected])]); if(type==='registrations')csvDownload('registraties.csv',[['categorie','activiteit','datum','deelnemers','uniek','doorstroom','uren','bijzonderheden'],...allOccurrences().filter(o=>o.reg).map(o=>[catName(o.category),o.title,o.occDate,o.reg.participants,o.reg.unique,o.reg.flow,o.reg.hours,o.reg.note])]); if(type==='kpis')csvDownload('kpis.csv',[['categorie','kpi','meetmethode','realisatie','doel','status'],...state.kpis.map(k=>{let v=metricValue(k), pct=k.target?v/k.target*100:0,s=statusFor(pct);return[catName(k.category),k.name,k.metric,v,k.target,statusLabel(s)]})])}
function exportJson(){let blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'}); let a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='beweegimpact-backup.json'; a.click()}
function importJson(){let f=document.getElementById('jsonImport').files[0]; if(!f)return; let r=new FileReader(); r.onload=e=>{state=JSON.parse(e.target.result); save(); toast('JSON geïmporteerd')}; r.readAsText(f)}
function resetDemo(){if(confirm('Alle lokale data wissen?')){state=defaults(); save()}}
document.getElementById('modal').addEventListener('click',e=>{if(e.target.id==='modal')closeModal()});
render();
</script>
</body></html>
